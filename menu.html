<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <button onclick="filterMenu('all')">All</button>
    <button onclick="filterMenu('mojito')">Mojito</button>
    <button onclick="filterMenu('juice')">Fresh Juice</button>
    <button onclick="filterMenu('crepe')">Crepe</button>
    <button onclick="filterMenu('toast')">Toast</button>

    <div class="menu-grid" id="menuGrid">Loading...</div>

<script>
    // حط هنا الـ URL والـ KEY ديالك
    const _supabase = window.supabase.createClient("YOUR_SUPABASE_URL", "YOUR_SUPABASE_KEY");

    async function filterMenu(category) {
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = "Loading...";

        let query = _supabase.from('products').select('*');
        
        // إلا كان الاختيار ماشي "all"، كنفلترو بـ الـ category
        if (category !== 'all') {
            query = query.eq('category', category);
        }

        let { data, error } = await query;

        if (error) {
            grid.innerHTML = "Error: " + error.message;
            return;
        }

        grid.innerHTML = "";
        if (data.length === 0) {
            grid.innerHTML = "No products found in this category.";
        } else {
            data.forEach(p => {
                grid.innerHTML += `
                <div class="card">
                    <img src="${p.image}" style="width:100px">
                    <h3>${p.title}</h3>
                    <p>${p.price} DH</p>
                </div>`;
            });
        }
    }

    // عرض كولشي فالبدية
    filterMenu('all');
</script>
</body>
</html>
