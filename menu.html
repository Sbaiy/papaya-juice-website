<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <button onclick="displayMenu('all')">All</button>
    <button onclick="displayMenu('mojito')">Mojito</button>
    <button onclick="displayMenu('juice')">Fresh Juice</button>
    <button onclick="displayMenu('crepe')">Crepe</button>
    <button onclick="displayMenu('toast')">Toast</button>

    <div id="menuGrid"></div>

<script>
    const _supabase = window.supabase.createClient("https://rlwshuurruvtnqwgbjkl.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3NodXVycnV2dG5xd2diamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkzMjAsImV4cCI6MjA5NDg1NTMyMH0.PV4EpbydpLTS36OVyaqy9qANWRec7B9F-emlaS0qqRw");

    async function displayMenu(filter = 'all') {
        let { data: products } = await _supabase.from('products').select('*');
        const grid = document.getElementById('menuGrid');
        grid.innerHTML = "";
        
        let filtered = filter === 'all' 
            ? products 
            : products.filter(p => p.category.toLowerCase() === filter.toLowerCase());

        filtered.forEach(p => {
            grid.innerHTML += `<div><img src="${p.image}" width="100"><h3>${p.title}</h3><p>${p.price} DH</p></div>`;
        });
    }

    displayMenu('all');
</script>
</body>
</html>
