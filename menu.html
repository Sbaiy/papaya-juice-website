<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- 1. Base Reset & Smooth Slow Background Animation --- */
body {
    margin: 0 !important;
    padding: 0 !important;
    min-height: 100vh !important;
    font-family: 'Poppins', sans-serif; /* تغيير الخط لـ Poppins الاحترافي */
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    padding-top: 50px !important;
    padding-bottom: 50px !important;
    box-sizing: border-box;
    background: linear-gradient(-45deg, #e67e22, #27ae60, #d35400, #1e824c) !important;
    background-size: 400% 400% !important;
    animation: gradientAnimation 20s ease infinite !important;
}

@keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* --- 2. Menu Header --- */
h1.menu-title {
    font-size: 42px;
    color: white;
    margin-bottom: 50px;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    font-weight: 700;
    text-align: center;
    letter-spacing: 1px;
}

/* --- 3. Products Grid Layout --- */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 30px;
    max-width: 1200px;
    width: 90%;
    margin: 0 auto;
}

/* --- 4. Glassmorphic Product Card --- */
.product-card {
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(15px) !important;
    -webkit-backdrop-filter: blur(15px) !important;
    border: 1px solid rgba(255, 255, 255, 0.35) !important;
    border-radius: 24px;
    padding: 25px;
    text-align: center; /* رد هنا كولشي فـ الوسط كيعطي منظر متوازن وهائل */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
}

.product-card:hover {
    transform: translateY(-8px); /* تحريك الكارت بنعومة للفوق */
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    background: rgba(255, 255, 255, 0.85) !important; /* كتزيد تضوا شوية فـ الهوفر */
}

/* --- 5. Product Image Support --- */
.product-card img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    margin-bottom: 15px;
    background: transparent !important;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.18)); /* زيادة عمق الظل باش تبان الأكلة حقيقية فوق الزجاج */
    transition: transform 0.3s ease;
}

.product-card:hover img {
    transform: scale(1.05); /* زوم خفيف للتصويرة ملي يدوز عليها الكليان الماوس */
}

/* --- 6. Product Info --- */
.product-info {
    width: 100%;
}

.product-card h3 {
    margin: 12px 0 8px 0;
    font-size: 19px;
    color: #1a1a1a;
    font-weight: 600;
    text-transform: capitalize;
}

.product-card p {
    margin: 5px auto 0 auto;
    font-size: 18px;
    color: #e67e22; 
    font-weight: 700;
    background: rgba(230, 126, 34, 0.1); /* خلفية برتقالية خفيفة وراء الثمن */
    padding: 4px 15px;
    border-radius: 50px;
    display: inline-block; /* باش تاخد حجم النص وماتسرحش كاملة */
}
</style>
</head>
<body>

    <h1 class="menu-title">Our Menu</h1>

    <div class="menu-grid" id="menuGrid"></div>

<script>
function displayMenu() {
    const menuGrid = document.getElementById('menuGrid');
    menuGrid.innerHTML = "";
    
    // جلب المنتجات من localStorage
    let products = JSON.parse(localStorage.getItem('products')) || [];

    if(products.length === 0) {
        menuGrid.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1; font-size: 20px; font-weight: 600;">No products available at the moment.</p>`;
        return;
    }

    products.forEach((product) => {
        menuGrid.innerHTML += `
        <div class="product-card">
            <img src="${product.image}" alt="${product.title}">
            <div class="product-info">
                <h3>${product.title}</h3>
                <p>${product.price} DH</p>
            </div>
        </div>
        `;
    });
}

// تشغيل الدالة تلقائياً عند فتح الصفحة
window.onload = displayMenu;
</script>

</body>
</html>
