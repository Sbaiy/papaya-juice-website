<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root { --primary: #ff6200; --dark-bg: #141d16; --white: #ffffff; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh; font-family: 'Poppins', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding-bottom: 100px;
    background-color: var(--dark-bg);
    background-image: radial-gradient(at 50% 0%, #253929 0px, transparent 60%), radial-gradient(at 0% 100%, #0d140f 0px, transparent 50%);
    background-attachment: fixed; color: #eceff1; overflow-x: hidden;
}

/* ── HEADER ── */
header.main-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 30px;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
    width: 90%; max-width: 1200px;
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
    animation: startUpAnimation 0.8s ease-out;
}
header.main-header.hide-nav { transform: translateX(-50%) translateY(-150px); opacity: 0; }
@keyframes startUpAnimation { 0% { top: -100px; opacity: 0; } 100% { top: 20px; opacity: 1; } }
.logo-link { display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0; }
.logo-link img { height: 42px; width: 42px; border-radius: 50%; object-fit: cover; }
.logo-link span { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
.nav-links { display: flex; gap: 22px; align-items: center; flex-shrink: 0; }
.nav-links a { text-decoration: none; color: #fff; font-weight: 500; font-size: 15px; transition: color 0.3s; }
.nav-links a:hover { color: var(--primary); }
.nav-links a.active { color: var(--primary); font-weight: 700; }

/* ── CAT BAR ── */
.cat-bar {
    position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 1200px; z-index: 999;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    overflow: visible; padding: 10px 20px;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
    animation: catBarIn 0.9s ease-out both;
}
.cat-bar.hide-nav { transform: translateX(-50%) translateY(-160px); opacity: 0; }
@keyframes catBarIn { 0% { top: -60px; opacity: 0; } 100% { top: 90px; opacity: 1; } }
.cat-pill {
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); color: #ccc;
    padding: 7px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.3s ease; white-space: nowrap; flex-shrink: 0;
    font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 6px;
}
.cat-pill:hover { background: rgba(255,98,0,0.2); border-color: var(--primary); color: #fff; transform: translateY(-2px); }
.cat-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 6px 18px rgba(255,98,0,0.4); transform: translateY(-2px); }
.arrow-icon { display: inline-block; font-style: normal; font-size: 11px; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); line-height: 1; }
.cat-pill.all-toggle.open .arrow-icon { transform: rotate(180deg); }
.cat-dropdown {
    position: absolute; top: calc(100% + 10px); left: 0; right: 0;
    background: rgba(16,26,18,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.13); border-radius: 22px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px; overflow: hidden;
    max-height: 0; opacity: 0; padding: 0 16px; pointer-events: none;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease, padding 0.35s ease;
}
.cat-dropdown.open { max-height: 400px; opacity: 1; padding: 14px 16px; pointer-events: all; }
.cat-dropdown .cat-pill { font-size: 12.5px; padding: 6px 18px; }

/* ── TITLE ── */
h1.menu-title {
    font-family: 'Playfair Display', serif; font-size: 42px; color: white;
    margin-top: 170px; margin-bottom: 30px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: 700; text-align: center;
    animation: fadeDown 0.8s ease both;
}
@keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

/* ── GRID ── */
.menu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px; max-width: 1200px; width: 90%; margin: 0 auto;
}

/* ── PRODUCT CARD ── */
.product-card {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 22px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; position: relative; overflow: visible;
    transition: box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
}
.product-card:hover { box-shadow: 0 20px 45px rgba(0,0,0,0.5); background: rgba(255,255,255,0.08); border-color: var(--primary); transform: translateY(-5px); }
.product-card img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 18px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35)); transition: transform 0.3s ease; }
.product-card:hover img { transform: scale(1.07); }
.product-info { width: 100%; display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
.product-info h3 { margin: 0; font-size: 15px; color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; word-break: break-word; }
.product-desc { font-size: 11px; color: #9db3a0; margin: 4px 0 0; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }

/* ── BOTTOM ROW ── */
.card-bottom-row { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
.product-price { font-size: 14px; color: var(--primary); font-weight: 700; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 50px; border: 1px solid rgba(255,98,0,0.3); white-space: nowrap; }

/* ── ADD BTN ── */
.add-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--primary); border: none; color: #fff;
    font-size: 20px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(255,98,0,0.5);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    flex-shrink: 0; position: relative;
}
.add-btn:hover { transform: scale(1.15); box-shadow: 0 6px 20px rgba(255,98,0,0.7); }
.add-btn:active { transform: scale(0.92); }
@keyframes popBtn { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
.add-btn.pop { animation: popBtn 0.35s ease; }
.add-btn .btn-badge {
    position: absolute; top: -6px; right: -6px;
    background: #fff; color: var(--primary); font-size: 10px; font-weight: 800;
    width: 18px; height: 18px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.add-btn .btn-badge.show { display: flex; }

/* ── MODAL ── */
.card-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.card-overlay.active { display: block; }
.modal-card {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.8); z-index: 600;
    width: min(360px,90vw); max-height: 85vh; overflow-y: auto;
    background: rgba(22,38,25,0.98); border: 1px solid var(--primary); border-radius: 24px; padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8); flex-direction: column; align-items: center; opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.35s ease;
}
.modal-card.active { display: flex; opacity: 1; transform: translate(-50%,-50%) scale(1); }
.modal-card img { width: 160px; height: 160px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4)); }
.modal-card h3 { font-size: 17px; color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; text-align: center; }
.modal-card .modal-price { font-size: 15px; color: var(--primary); font-weight: 700; background: rgba(255,255,255,0.06); padding: 5px 16px; border-radius: 50px; border: 1px solid rgba(255,98,0,0.35); margin-bottom: 16px; }
.modal-card .modal-desc { font-size: 13px; color: #b8cebb; line-height: 1.75; text-align: center; }
.modal-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.08); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; color: #fff; font-size: 16px; }
.modal-close:hover { background: rgba(255,98,0,0.4); }

/* ── MODAL QTY ── */
.modal-qty-row {
    display: flex; align-items: center; gap: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px; overflow: hidden;
    margin: 18px 0 6px;
}
.modal-qty-btn {
    background: none; border: none; color: #fff;
    font-size: 22px; font-weight: 700;
    width: 44px; height: 44px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
    font-family: 'Poppins', sans-serif;
}
.modal-qty-btn:hover { background: rgba(255,98,0,0.25); color: var(--primary); }
.modal-qty-btn.m-minus:hover { background: rgba(255,50,50,0.2); color: #ff6b6b; }
.modal-qty-display {
    font-size: 16px; font-weight: 700; color: #fff;
    min-width: 36px; text-align: center; user-select: none;
}
.modal-add-btn {
    width: 100%; background: var(--primary); border: none;
    color: #fff; font-family: 'Poppins', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 14px; border-radius: 14px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,98,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 10px;
}
.modal-add-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,98,0,0.6); }
.modal-add-btn:active { transform: scale(0.97); }

/* ── EMPTY ── */
.empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #7a9980; font-size: 16px; }
.empty-state span { font-size: 3rem; display: block; margin-bottom: 14px; }

/* ════════════════════════
   PANIER
════════════════════════ */
.cart-fab {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%); z-index: 800;
    background: var(--primary); color: #fff; border: none;
    border-radius: 50px; padding: 14px 28px;
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 30px rgba(255,98,0,0.55);
    transition: opacity 0.3s ease, box-shadow 0.3s ease;
    opacity: 0; pointer-events: none; white-space: nowrap;
}
.cart-fab.visible { opacity: 1; pointer-events: all; }
.cart-fab:hover { box-shadow: 0 12px 40px rgba(255,98,0,0.75); }
.cart-fab .fab-icon { font-size: 20px; }
.cart-fab .fab-count { background: #fff; color: var(--primary); font-size: 12px; font-weight: 800; padding: 2px 8px; border-radius: 50px; min-width: 22px; text-align: center; }
.cart-fab .fab-total { font-size: 13px; opacity: 0.9; border-left: 1px solid rgba(255,255,255,0.35); padding-left: 10px; }
@keyframes fabPulse {
    0%   { box-shadow: 0 8px 30px rgba(255,98,0,0.55); }
    50%  { box-shadow: 0 8px 50px rgba(255,98,0,0.9), 0 0 0 12px rgba(255,98,0,0.15); }
    100% { box-shadow: 0 8px 30px rgba(255,98,0,0.55); }
}
.cart-fab.pulse { animation: fabPulse 0.5s ease; }

.cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 900; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
.cart-overlay.active { display: block; }

.cart-panel {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: min(520px,100%); max-height: 80vh;
    background: rgba(16,26,18,0.98); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12); border-bottom: none;
    border-radius: 28px 28px 0 0; z-index: 950;
    display: flex; flex-direction: column;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
    transition: transform 0.45s cubic-bezier(0.32,0.72,0,1);
    overflow: hidden;
    touch-action: none;
}
.cart-panel.open { transform: translateX(-50%) translateY(0%); }

/* ── HANDLE ── */
.cart-handle {
    width: 42px; height: 5px;
    background: rgba(255,255,255,0.25); border-radius: 3px;
    margin: 14px auto 0; flex-shrink: 0;
    cursor: grab; transition: background 0.2s;
}
.cart-handle:hover { background: rgba(255,98,0,0.6); }
.cart-handle:active { cursor: grabbing; }

.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 12px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.cart-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; font-weight: 700; }
.cart-header h2 span { color: var(--primary); }
.cart-clear-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: #aaa; font-size: 12px; font-family: 'Poppins', sans-serif; font-weight: 600; padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
.cart-clear-btn:hover { background: rgba(255,50,50,0.2); color: #ff6b6b; border-color: rgba(255,50,50,0.4); }

.cart-items {
    flex: 1; overflow-y: auto; padding: 12px 20px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(255,98,0,0.3) transparent;
    touch-action: pan-y;
    overscroll-behavior: contain;
}
.cart-items::-webkit-scrollbar { width: 4px; }
.cart-items::-webkit-scrollbar-thumb { background: rgba(255,98,0,0.35); border-radius: 4px; }

.cart-item { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 12px 14px; animation: slideItemIn 0.3s ease; transition: background 0.2s; }
.cart-item:hover { background: rgba(255,255,255,0.07); }
@keyframes slideItemIn { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
.cart-item img { width: 52px; height: 52px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); flex-shrink: 0; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-info h4 { font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.cart-item-info .item-price { font-size: 12px; color: var(--primary); font-weight: 600; }

.qty-controls { display: flex; align-items: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; overflow: hidden; flex-shrink: 0; }
.qty-btn { background: none; border: none; color: #fff; font-size: 18px; font-weight: 700; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; font-family: 'Poppins', sans-serif; }
.qty-btn:hover { background: rgba(255,98,0,0.25); color: var(--primary); }
.qty-btn.minus:hover { background: rgba(255,50,50,0.2); color: #ff6b6b; }
.qty-display { font-size: 13px; font-weight: 700; color: #fff; min-width: 24px; text-align: center; user-select: none; }

.cart-empty { text-align: center; padding: 40px 20px; color: #7a9980; }
.cart-empty .empty-icon { font-size: 3rem; display: block; margin-bottom: 12px; }
.cart-empty p { font-size: 14px; }

.cart-footer { padding: 16px 24px 28px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; background: rgba(16,26,18,0.6); }
.cart-summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.summary-label { font-size: 13px; color: #9db3a0; font-weight: 500; }
.summary-total { font-size: 20px; font-weight: 700; color: var(--primary); }
.summary-items { font-size: 12px; color: #7a9980; margin-top: 2px; }
.order-btn { width: 100%; background: var(--primary); border: none; color: #fff; font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; padding: 16px; border-radius: 16px; cursor: pointer; box-shadow: 0 8px 24px rgba(255,98,0,0.4); transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.order-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,98,0,0.6); }
.order-btn:active { transform: scale(0.98); }

/* ── MOBILE ── */
@media (max-width: 768px) {
    header.main-header { flex-direction: column; gap: 10px; padding: 12px 15px; width: 92%; top: 10px; animation: startUpAnimationMobile 0.8s ease-out; }
    @keyframes startUpAnimationMobile { 0% { top: -150px; opacity: 0; } 100% { top: 10px; opacity: 1; } }
    .nav-links { gap: 18px; }
    .nav-links a { font-size: 14px; }
    .cat-bar { top: 115px; width: 92%; padding: 8px 14px; gap: 8px; border-radius: 20px; }
    @keyframes catBarIn { 0% { top: -60px; opacity: 0; } 100% { top: 115px; opacity: 1; } }
    .cat-dropdown { border-radius: 16px; }
    h1.menu-title { font-size: 30px; margin-top: 210px; margin-bottom: 20px; }
    .menu-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; width: 92% !important; }
    .product-card { padding: 14px !important; border-radius: 18px !important; }
    .product-card img { width: 90px !important; height: 90px !important; margin-bottom: 12px !important; }
    .product-info h3 { font-size: 11px !important; }
    .product-price { font-size: 12px !important; padding: 3px 9px !important; }
    .add-btn { width: 30px !important; height: 30px !important; font-size: 17px !important; }
    .cart-panel { width: 100%; border-radius: 24px 24px 0 0; }
    .cart-fab { font-size: 14px; padding: 12px 22px; }
}
</style>
</head>
<body>

<div class="card-overlay" id="cardOverlay"></div>
<div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImg" src="" alt="">
    <h3 id="modalTitle"></h3>
    <span class="modal-price" id="modalPrice"></span>
    <p class="modal-desc" id="modalDesc"></p>

    <!-- ── QUANTITY SELECTOR ── -->
    <div class="modal-qty-row">
        <button class="modal-qty-btn m-minus" id="modalMinus">−</button>
        <span class="modal-qty-display" id="modalQty">1</span>
        <button class="modal-qty-btn m-plus" id="modalPlus">+</button>
    </div>

    <!-- ── ADD TO CART BTN ── -->
    <button class="modal-add-btn" id="modalAddBtn">
        🛒 Ajouter au panier
    </button>
</div>

<header class="main-header" id="mainHeader">
    <a href="index.html" class="logo-link">
        <img src="logo.png" alt="Papaya Juice">
        <span>Papaya Juice</span>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html" class="active">Menu</a>
    </nav>
</header>

<div class="cat-bar" id="catBar"></div>

<h1 class="menu-title">Our <span style="color:var(--primary)">Menu</span></h1>

<div class="menu-grid" id="menuGrid">
    <div style="grid-column:1/-1;text-align:center;padding:60px;color:#7a9980;font-size:15px;">Loading menu…</div>
</div>

<button class="cart-fab" id="cartFab">
    <span class="fab-icon">🛒</span>
    <span class="fab-count" id="fabCount">0</span>
    <span class="fab-total" id="fabTotal">0 DH</span>
</button>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-panel" id="cartPanel">
    <div class="cart-handle" id="cartHandle"></div>
    <div class="cart-header">
        <h2>Mon <span>Panier</span></h2>
        <button class="cart-clear-btn" id="cartClearBtn">Vider</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <div class="cart-summary">
            <div>
                <div class="summary-label">Total commande</div>
                <div class="summary-items" id="cartItemCount">0 article(s)</div>
            </div>
            <div class="summary-total" id="cartTotal">0 DH</div>
        </div>
        <button class="order-btn" id="orderBtn">
            <span>✅</span> Confirmer la commande
        </button>
    </div>
</div>

<script>
const SUPABASE_URL = "https://rlwshuurruvtnqwgbjkl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3NodXVycnV2dG5xd2diamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkzMjAsImV4cCI6MjA5NDg1NTMyMH0.PV4EpbydpLTS36OVyaqy9qANWRec7B9F-emlaS0qqRw";
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allProducts = [];
let activeCategory = 'all';
let cart = {};
let cartIsOpen = false;

/* ════════════════════════
   CART LOGIC
════════════════════════ */
function cartAddOne(product) {
    if (cart[product.id]) cart[product.id].qty++;
    else cart[product.id] = { product, qty: 1 };
    updateCartUI();
    updateAddBtnBadge(product.id);
    triggerFabPulse();
}
function cartRemoveOne(productId) {
    if (!cart[productId]) return;
    cart[productId].qty--;
    if (cart[productId].qty <= 0) delete cart[productId];
    updateCartUI();
    updateAddBtnBadge(productId);
}
function cartClear() {
    cart = {};
    updateCartUI();
    document.querySelectorAll('.add-btn .btn-badge').forEach(b => { b.textContent = ''; b.classList.remove('show'); });
}
function cartTotal() { return Object.values(cart).reduce((s, { product, qty }) => s + parseFloat(product.price) * qty, 0); }
function cartItemsCount() { return Object.values(cart).reduce((s, { qty }) => s + qty, 0); }

/* ════════════════════════
   CART UI
════════════════════════ */
function updateCartUI() {
    const count = cartItemsCount();
    const total = cartTotal();
    const fab = document.getElementById('cartFab');
    document.getElementById('fabCount').textContent = count;
    document.getElementById('fabTotal').textContent = total.toFixed(0) + ' DH';
    if (count > 0) fab.classList.add('visible');
    else { fab.classList.remove('visible'); closeCart(); }

    const itemsEl = document.getElementById('cartItems');
    const items = Object.values(cart);
    if (!items.length) {
        itemsEl.innerHTML = `<div class="cart-empty"><span class="empty-icon">🧃</span><p>Ton panier est vide.<br>Ajoute des produits !</p></div>`;
    } else {
        itemsEl.innerHTML = '';
        items.forEach(({ product, qty }) => {
            const row = document.createElement('div');
            row.className = 'cart-item';
            const lineTotal = (parseFloat(product.price) * qty).toFixed(0);
            row.innerHTML = `
                <img src="${product.image}" alt="${product.title}">
                <div class="cart-item-info">
                    <h4>${product.title}</h4>
                    <div class="item-price">${lineTotal} DH</div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn minus" data-id="${product.id}">−</button>
                    <span class="qty-display">${qty}</span>
                    <button class="qty-btn plus" data-id="${product.id}">+</button>
                </div>`;
            row.querySelector('.minus').addEventListener('click', e => { e.stopPropagation(); cartRemoveOne(product.id); });
            row.querySelector('.plus').addEventListener('click',  e => { e.stopPropagation(); cartAddOne(product); });
            itemsEl.appendChild(row);
        });
    }
    document.getElementById('cartTotal').textContent = total.toFixed(0) + ' DH';
    document.getElementById('cartItemCount').textContent = count + ' article(s)';
}

function updateAddBtnBadge(productId) {
    const btn = document.querySelector(`.add-btn[data-id="${productId}"]`);
    if (!btn) return;
    const badge = btn.querySelector('.btn-badge');
    const qty = cart[productId] ? cart[productId].qty : 0;
    badge.textContent = qty || '';
    qty > 0 ? badge.classList.add('show') : badge.classList.remove('show');
}

function triggerFabPulse() {
    const fab = document.getElementById('cartFab');
    fab.classList.remove('pulse'); void fab.offsetWidth; fab.classList.add('pulse');
    setTimeout(() => fab.classList.remove('pulse'), 600);
}

/* ════════════════════════
   CART OPEN / CLOSE
════════════════════════ */
function openCart() {
    cartIsOpen = true;
    document.getElementById('cartPanel').classList.add('open');
    document.getElementById('cartOverlay').classList.add('active');
}
function closeCart() {
    cartIsOpen = false;
    document.getElementById('cartPanel').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('active');
}

document.getElementById('cartFab').addEventListener('click', openCart);
document.getElementById('cartOverlay').addEventListener('click', closeCart);
document.getElementById('cartClearBtn').addEventListener('click', cartClear);

document.getElementById('orderBtn').addEventListener('click', () => {
    const items = Object.values(cart).map(({ product, qty }) =>
        `• ${qty}x ${product.title} — ${(product.price * qty).toFixed(0)} DH`).join('%0A');
    const total = cartTotal().toFixed(0);
    const msg = `🧃 *Commande Papaya Juice*%0A%0A${items}%0A%0A*Total: ${total} DH*`;
    window.open(`https://wa.me/212XXXXXXXXX?text=${msg}`, '_blank');
});

/* ════════════════════════
   DRAG HANDLE — swipe down to close
════════════════════════ */
(function() {
    const handle = document.getElementById('cartHandle');
    const panel  = document.getElementById('cartPanel');
    let startY = 0, currentY = 0, isDragging = false;

    function onStart(e) {
        isDragging = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        currentY = startY;
        panel.style.transition = 'none';
    }
    function onMove(e) {
        if (!isDragging) return;
        currentY = e.touches ? e.touches[0].clientY : e.clientY;
        const delta = Math.max(0, currentY - startY);
        panel.style.transform = `translateX(-50%) translateY(${delta}px)`;
    }
    function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        panel.style.transition = '';
        const delta = currentY - startY;
        if (delta > 80) {
            panel.style.transform = '';
            closeCart();
        } else {
            panel.style.transform = 'translateX(-50%) translateY(0%)';
        }
    }

    handle.addEventListener('touchstart', onStart, { passive: true });
    handle.addEventListener('touchmove',  onMove,  { passive: true });
    handle.addEventListener('touchend',   onEnd);
    handle.addEventListener('mousedown',  onStart);
    window.addEventListener('mousemove',  onMove);
    window.addEventListener('mouseup',    onEnd);
})();

/* ════════════════════════
   LOAD PRODUCTS
════════════════════════ */
async function loadMenuAndCategories() {
    try {
        let { data: products, error } = await _supabase.from('products').select('*');
        if (error) { showError(); return; }
        let filtered = (products || []).filter(p => p.disponible !== false);
        const hasSortOrder = filtered.some(p => p.sort_order != null);
        if (hasSortOrder) {
            filtered.sort((a, b) => (a.sort_order ?? 999) - (b.sort_order ?? 999));
        } else {
            const saved = JSON.parse(localStorage.getItem('productOrder') || '[]');
            if (saved.length) filtered.sort((a, b) => {
                const ai = saved.indexOf(a.id), bi = saved.indexOf(b.id);
                return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            });
        }
        allProducts = filtered;
        const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
        buildCategoryBar(cats);
        displayProducts(allProducts);
        attachCardClicks();
    } catch { showError(); }
}

/* ════════════════════════
   CATEGORY BAR
════════════════════════ */
function buildCategoryBar(cats) {
    const bar = document.getElementById('catBar');
    bar.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'cat-pill all-toggle active';
    allBtn.id = 'allMenuBtn';
    allBtn.innerHTML = 'Category <span class="arrow-icon">▾</span>';
    bar.appendChild(allBtn);

    const dropdown = document.createElement('div');
    dropdown.className = 'cat-dropdown';
    dropdown.id = 'catDropdown';
    bar.appendChild(dropdown);

    cats.forEach((cat, i) => {
        const pill = document.createElement('button');
        pill.className = 'cat-pill';
        pill.textContent = cat;
        pill.style.animationDelay = `${i * 50}ms`;
        pill.addEventListener('click', () => onCategoryClick(cat, pill));
        dropdown.appendChild(pill);
    });

    allBtn.addEventListener('click', () => {
        dropdown.classList.contains('open') ? closeDropdown() : openDropdown();
        activeCategory = 'all';
        dropdown.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        displayProducts(allProducts);
        attachCardClicks();
    });

    document.addEventListener('click', (e) => {
        if (!document.getElementById('catBar').contains(e.target)) closeDropdown();
    });
}
function openDropdown()  { document.getElementById('catDropdown')?.classList.add('open');    document.getElementById('allMenuBtn')?.classList.add('open'); }
function closeDropdown() { document.getElementById('catDropdown')?.classList.remove('open'); document.getElementById('allMenuBtn')?.classList.remove('open'); }

function onCategoryClick(category, pill) {
    document.querySelectorAll('#catDropdown .cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCategory = category;
    displayProducts(allProducts.filter(p => p.category === category));
    attachCardClicks();
    setTimeout(closeDropdown, 180);
    setTimeout(() => {
        const grid = document.getElementById('menuGrid');
        const gridTop = grid.getBoundingClientRect().top + window.pageYOffset;
        window.scrollTo({ top: Math.max(0, gridTop - 158), behavior: 'smooth' });
    }, 220);
}

/* ════════════════════════
   DISPLAY PRODUCTS
════════════════════════ */
function displayProducts(list) {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><span>🍃</span>No items in this category yet.</div>`;
        return;
    }
    list.forEach((product) => {
        const desc = product.description && product.description !== '-' ? product.description : '';
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <img src="${product.image}" alt="${product.title}" loading="lazy">
            <div class="product-info">
                <h3>${product.title}</h3>
                ${desc ? `<p class="product-desc">${desc}</p>` : ''}
            </div>
            <div class="card-bottom-row">
                <p class="product-price">${product.price} DH</p>
                <button class="add-btn" data-id="${product.id}" title="Ajouter au panier">
                    +
                    <span class="btn-badge"></span>
                </button>
            </div>`;

        if (cart[product.id]) {
            const badge = card.querySelector('.btn-badge');
            badge.textContent = cart[product.id].qty;
            badge.classList.add('show');
        }

        card.querySelector('.add-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const btn = e.currentTarget;
            btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
            cartAddOne(product);
        });

        grid.appendChild(card);
    });
}

function showError() {
    document.getElementById('menuGrid').innerHTML =
        `<div class="empty-state"><span>⚠️</span>Could not load menu. Please try again.</div>`;
}

/* ════════════════════════
   MODAL — مع quantity selector
════════════════════════ */
const overlay    = document.getElementById('cardOverlay');
const modal      = document.getElementById('modalCard');
const modalClose = document.getElementById('modalClose');

let modalCurrentProduct = null;
let modalQty = 1;

function openModal(product) {
    modalCurrentProduct = product;
    // ابدأ بالكمية الموجودة في الpanier إن كانت، وإلا 1
    modalQty = cart[product.id] ? cart[product.id].qty : 1;

    document.getElementById('modalImg').src           = product.image;
    document.getElementById('modalTitle').textContent = product.title;
    document.getElementById('modalPrice').textContent = product.price + ' DH';
    document.getElementById('modalDesc').textContent  =
        (product.description && product.description !== '-') ? product.description : '';
    document.getElementById('modalQty').textContent = modalQty;
    updateModalAddBtn();

    overlay.classList.add('active');
    modal.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => modal.classList.add('active')));
    header.classList.add('hide-nav');
    catBar.classList.add('hide-nav');
    closeDropdown();
}

function updateModalAddBtn() {
    const total = (parseFloat(modalCurrentProduct?.price || 0) * modalQty).toFixed(0);
    document.getElementById('modalAddBtn').innerHTML =
        `🛒 Ajouter (${modalQty}) — ${total} DH`;
}

function closeModal() {
    modal.classList.remove('active');
    overlay.classList.remove('active');
    setTimeout(() => { modal.style.display = 'none'; }, 400);
    header.classList.remove('hide-nav');
    catBar.classList.remove('hide-nav');
}

overlay.addEventListener('click', closeModal);
modalClose.addEventListener('click', closeModal);

// − زيد الكمية
document.getElementById('modalMinus').addEventListener('click', () => {
    if (modalQty > 1) {
        modalQty--;
        document.getElementById('modalQty').textContent = modalQty;
        updateModalAddBtn();
    }
});

// + نقص الكمية
document.getElementById('modalPlus').addEventListener('click', () => {
    modalQty++;
    document.getElementById('modalQty').textContent = modalQty;
    updateModalAddBtn();
});

// زر إضافة للpanier
document.getElementById('modalAddBtn').addEventListener('click', () => {
    if (!modalCurrentProduct) return;
    // reset الكمية الحالية وزيد الكمية الجديدة
    delete cart[modalCurrentProduct.id];
    for (let i = 0; i < modalQty; i++) cartAddOne(modalCurrentProduct);
    closeModal();
});

function attachCardClicks() {
    document.querySelectorAll('.product-card').forEach((card) => {
        card.addEventListener('click', () => {
            const title = card.querySelector('h3').textContent;
            const product = allProducts.find(p => p.title === title) || {};
            openModal(product);
        });
    });
}

/* ════════════════════════
   SCROLL
════════════════════════ */
let lastST = 0;
const header = document.getElementById('mainHeader');
const catBar = document.getElementById('catBar');

window.addEventListener('scroll', () => {
    if (cartIsOpen) return;
    const st = window.pageYOffset || document.documentElement.scrollTop;
    if (st > lastST && st > 100) {
        header.classList.add('hide-nav');
        catBar.classList.add('hide-nav');
        closeDropdown();
    } else {
        header.classList.remove('hide-nav');
        catBar.classList.remove('hide-nav');
    }
    lastST = st <= 0 ? 0 : st;
}, { passive: true });

window.onload = loadMenuAndCategories;
</script>
</body>
</html>
