<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin: 0 !important; padding: 0 !important; min-height: 100vh !important; font-family: 'Poppins', sans-serif; display: flex !important; justify-content: center !important; align-items: center !important; background: linear-gradient(-45deg, #e67e22, #27ae60, #d35400, #1e824c) !important; background-size: 400% 400% !important; animation: gradientAnimation 20s ease infinite !important; }
@keyframes gradientAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.login-section { background: transparent !important; width: 100% !important; display: flex !important; justify-content: center !important; align-items: center !important; }
.dashboard-section { width: 100% !important; min-height: 100vh !important; display: none; box-sizing: border-box; padding: 30px; }

/* تأثير الزجاج الفخم (Glassmorphism) على الحاوية الرئيسية */
.container { 
    max-width: 550px; 
    width: 100%; 
    margin: auto; 
    background: rgba(255, 255, 255, 0.08) !important; 
    backdrop-filter: blur(15px) !important; 
    -webkit-backdrop-filter: blur(15px) !important; 
    border: 1px solid rgba(255, 255, 255, 0.15) !important; 
    padding: 30px; 
    border-radius: 20px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
    box-sizing: border-box; 
}

.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

/* تعديل لون العناوين للأبيض باش تبان واضحة */
h1 { text-align: center; margin-bottom: 30px; color: #ffffff; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

/* الخانات (Inputs) والقوائم المنسدلة (Select) زجاجية وشفافة */
input, select { 
    width: 100%; 
    padding: 15px; 
    margin-bottom: 20px; 
    border-radius: 10px; 
    border: 1px solid rgba(255, 255, 255, 0.2); 
    background: rgba(255, 255, 255, 0.12) !important; 
    font-size: 16px; 
    box-sizing: border-box; 
    color: #ffffff !important; 
    backdrop-filter: blur(5px);
}

/* تعديل لون النص التوضيحي (Placeholder) داخل الخانات ليكون واضحاً */
input::placeholder { color: rgba(255, 255, 255, 0.7); }

/* ستايل عند التركيز على الخانات */
input:focus, select:focus {
    outline: none;
    border-color: #e67e22 !important;
    background: rgba(255, 255, 255, 0.18) !important;
}

/* تعديل ستايل الـ options داخل الـ Select باش تبان في الأنظمة العادية */
select option { background: #1e824c; color: #fff; }

button { width: 100%; padding: 15px; border: none; background: #e67e22; color: white; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: 600; transition: 0.3s ease; }
button:hover { background: #d35400; transform: translateY(-2px); }
.logout-btn { background: #d32f2f; width: auto; padding: 10px 20px; font-size: 14px; }
.logout-btn:hover { background: #b71c1c; }

/* كارتات المنتوجات زجاجية شفافة متناسقة */
.product-item { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    background: rgba(255, 255, 255, 0.05) !important; 
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
    border: 1px solid rgba(255, 255, 255, 0.1); 
    padding: 15px; 
    border-radius: 15px; 
    margin-bottom: 20px; 
}
.product-item img { width: 60px; height: 60px; object-fit: contain; border-radius: 10px; background: transparent; }
.product-item div { flex: 1; margin-left: 15px; }
.product-item h3 { margin: 0 0 5px 0; color: #ffffff; font-size: 16px; }
.product-item p { margin: 0; color: #ff9f43; font-weight: bold; }
.product-item .badge { background: #27ae60; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px; display: inline-block; margin-top: 4px; }
.action-btns { display: flex; flex-direction: column; gap: 8px; }
.product-item button.delete-btn { width: auto; padding: 8px 12px; background: #d32f2f; font-size: 13px; }
.product-item button.delete-btn:hover { background: #b71c1c; }
.product-item button.edit-btn { width: auto; padding: 8px 12px; background: #2980b9; font-size: 13px; }
.product-item button.edit-btn:hover { background: #1f6696; }
.preview { width: 100%; height: 150px; object-fit: contain; margin-bottom: 20px; display: none; background: transparent; }
.cancel-edit-btn { background: #7f8c8d; margin-top: 10px; display: none; }
.cancel-edit-btn:hover { background: #6c7a7d; }

/* ستايل حاوية الكاتيغوري مع الأزرار + و - */
.category-container { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; }
.category-container select { margin-bottom: 0 !important; flex: 1; }
.add-cat-btn { width: auto; padding: 15px 18px; background: #27ae60; font-size: 16px; font-weight: bold; border-radius: 10px; }
.add-cat-btn:hover { background: #1e824c; }
.del-cat-btn { width: auto; padding: 15px 18px; background: #d32f2f; font-size: 16px; font-weight: bold; border-radius: 10px; }
.del-cat-btn:hover { background: #b71c1c; }

/* تعديل لون لودينغ */
#productsList { color: #ffffff; font-weight: 500; }
</style>
</head>
<body>

<div id="loginSection" class="login-section">
    <div class="container">
        <h1>Admin Login</h1>
        <div id="errorMessage" style="color:#ff4d4d; display:none; text-align:center; margin-bottom:15px; font-weight:bold;"></div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="dashboardSection" class="dashboard-section">
    <div class="container">
        <div class="admin-header">
            <h1 style="margin-bottom: 0;">Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="productsList">Loading...</div>
        
        <h1 id="formTitle" style="margin-top: 20px;">Add Product</h1>
        <input type="file" id="imageInput" accept="image/*" style="padding: 10px;">
        <img id="preview" class="preview">
        
        <div class="category-container">
            <select id="categorySelect"></select>
            <button class="add-cat-btn" onclick="addNewCategory()" type="button" title="Add new category">+</button>
            <button class="del-cat-btn" onclick="deleteCurrentCategory()" type="button" title="Delete selected category">-</button>
        </div>

        <input type="text" id="title" placeholder="Product Name">
        <input type="text" id="price" placeholder="Price">
        <button id="submitProductBtn" onclick="handleSubmit()">Add Product</button>
        <button id="cancelEditBtn" class="cancel-edit-btn" onclick="clearForm()">Cancel Edit</button>
    </div>
</div>

<script>
const SUPABASE_URL = "https://rlwshuurruvtnqwgbjkl.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3NodXVycnV2dG5xd2diamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkzMjAsImV4cCI6MjA5NDg1NTMyMH0.PV4EpbydpLTS36OVyaqy9qANWRec7B9F-emlaS0qqRw"; 
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_USERNAME = "sbaiy"; const ADMIN_PASSWORD = "2030";

const defaultCategories = [
    "petit dejeuner", "juice", "crepe", "toast", "mojito", 
    "juice detox", "tisanes", "boissons chaudes", "Pancakes", 
    "milkshake", "smoothies", "restaurant", "ice coffee", 
    "ice tea", "salade fruite", "pâtisserie"
];

const inactivityTimeout = 60000; 
let inactivityTimer;
let currentEditingProductId = null; 
let globalProductsArray = []; 

function loadCategoriesSelect() {
    const select = document.getElementById('categorySelect');
    let customCategories = JSON.parse(localStorage.getItem('customCategories')) || [];
    let allCategories = [...defaultCategories, ...customCategories];
    
    select.innerHTML = "";
    allCategories.forEach(cat => {
        select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

function addNewCategory() {
    let newCat = prompt("Enter the name of the new category:");
    if (newCat) {
        newCat = newCat.trim();
        if (newCat === "") return;
        
        let customCategories = JSON.parse(localStorage.getItem('customCategories')) || [];
        
        if (defaultCategories.includes(newCat) || customCategories.includes(newCat)) {
            alert("This category already exists!");
            return;
        }
        
        customCategories.push(newCat);
        localStorage.setItem('customCategories', JSON.stringify(customCategories));
        
        loadCategoriesSelect();
        document.getElementById('categorySelect').value = newCat;
    }
}

function deleteCurrentCategory() {
    const select = document.getElementById('categorySelect');
    const selectedCat = select.value;

    if (defaultCategories.includes(selectedCat)) {
        alert("This is a system category and cannot be deleted!");
        return;
    }

    if (confirm(`Are you sure you want to delete the category "${selectedCat}"?`)) {
        let customCategories = JSON.parse(localStorage.getItem('customCategories')) || [];
        
        customCategories = customCategories.filter(cat => cat !== selectedCat);
        localStorage.setItem('customCategories', JSON.stringify(customCategories));
        
        loadCategoriesSelect();
        alert("Category deleted successfully!");
    }
}

function startInactivityTimer() {
    if (localStorage.getItem('adminLoggedIn') === 'true') {
        resetInactivityTimer();
        window.onmousemove = resetInactivityTimer; window.onmousedown = resetInactivityTimer;
        window.onkeydown = resetInactivityTimer; window.onclick = resetInactivityTimer; window.ontouchstart = resetInactivityTimer;
    }
}

function stopInactivityTimer() { clearTimeout(inactivityTimer); window.onmousemove = null; window.onmousedown = null; window.onkeydown = null; window.onclick = null; window.ontouchstart = null; }
function resetInactivityTimer() { clearTimeout(inactivityTimer); inactivityTimer = setTimeout(triggerAutoLogout, inactivityTimeout); }
function triggerAutoLogout() { alert("Session expired due to inactivity. Please login again."); logout(); }

function checkLogin(){ if(localStorage.getItem('adminLoggedIn') === 'true') { showDashboard(); } else { showLogin(); } }
function login(){ if(document.getElementById('username').value === ADMIN_USERNAME && document.getElementById('password').value === ADMIN_PASSWORD){ localStorage.setItem('adminLoggedIn', 'true'); showDashboard(); } else { document.getElementById('errorMessage').style.display = 'block'; document.getElementById('errorMessage').textContent = 'Wrong credentials'; } }
function logout(){ localStorage.removeItem('adminLoggedIn'); stopInactivityTimer(); showLogin(); }
function showLogin(){ document.getElementById('loginSection').style.setProperty('display', 'flex', 'important'); document.getElementById('dashboardSection').style.setProperty('display', 'none', 'important'); }
function showDashboard(){ document.getElementById('loginSection').style.setProperty('display', 'none', 'important'); document.getElementById('dashboardSection').style.setProperty('display', 'block', 'important'); loadProducts(); startInactivityTimer(); }

const imageInput = document.getElementById('imageInput'); const preview = document.getElementById('preview'); let imageData = "";
imageInput.addEventListener('change', function(){
    const file = this.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(e){
            const img = new Image(); img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas'); 
                let width = img.width, height = img.height, maxSize = 800; 
                if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, width, height); 
                ctx.drawImage(img, 0, 0, width, height);
                imageData = canvas.toDataURL('image/png'); 
                preview.src = imageData; preview.style.display = 'block';
            }
        }
        reader.readAsDataURL(file);
    }
});

async function handleSubmit() { if (currentEditingProductId === null) { await addProduct(); } else { await updateProduct(); } }

async function addProduct(){ 
    const title = document.getElementById('title').value; 
    const price = document.getElementById('price').value; 
    const category = document.getElementById('categorySelect').value; 
    if(!title || !price || !imageData){ alert('Fill all fields!'); return; } 
    const { error } = await _supabase.from('products').insert([{ title, price, image: imageData, category }]); 
    if(error) { alert('Error saving data'); } else { clearForm(); loadProducts(); } 
}

function startEdit(id) {
    const product = globalProductsArray.find(p => p.id === id);
    if (!product) return;

    currentEditingProductId = id;
    
    document.getElementById('formTitle').textContent = "Update Product";
    document.getElementById('submitProductBtn').textContent = "Save Changes";
    document.getElementById('cancelEditBtn').style.display = "block";

    document.getElementById('title').value = product.title;
    document.getElementById('price').value = product.price;
    
    let select = document.getElementById('categorySelect');
    let options = Array.from(select.options).map(opt => opt.value);
    if(!options.includes(product.category)) {
        let customCategories = JSON.parse(localStorage.getItem('customCategories')) || [];
        customCategories.push(product.category);
        localStorage.setItem('customCategories', JSON.stringify(customCategories));
        loadCategoriesSelect();
    }
    
    select.value = product.category;
    imageData = product.image; preview.src = imageData; preview.style.display = 'block';
    document.getElementById('formTitle').scrollIntoView({ behavior: 'smooth' });
}

async function updateProduct() {
    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;
    const category = document.getElementById('categorySelect').value;
    if(!title || !price || !imageData){ alert('Fill all fields!'); return; }
    const { error } = await _supabase.from('products').update({ title, price, image: imageData, category }).eq('id', currentEditingProductId);
    if (error) { alert('Error updating data'); } else { alert('Product updated successfully!'); clearForm(); loadProducts(); }
}

function clearForm() {
    currentEditingProductId = null; document.getElementById('formTitle').textContent = "Add Product"; document.getElementById('submitProductBtn').textContent = "Add Product"; document.getElementById('cancelEditBtn').style.display = "none";
    document.getElementById('title').value = ''; document.getElementById('price').value = ''; document.getElementById('imageInput').value = ''; preview.style.display = 'none'; imageData = "";
}

async function deleteProduct(id){ 
    if(confirm('Are you sure you want to delete this product?')) {
        const { error } = await _supabase.from('products').delete().eq('id', id); 
        if(!error) { if(currentEditingProductId === id) clearForm(); loadProducts(); } else { alert('Error deleting product'); }
    }
}

async function loadProducts(){ 
    const list = document.getElementById('productsList'); list.innerHTML = "Loading..."; 
    let { data: products, error } = await _supabase.from('products').select('*').order('id', { ascending: false }); 
    if(error) { list.innerHTML = "Error"; return; } 
    list.innerHTML = ""; globalProductsArray = products; 
    products.forEach((product)=>{ 
        list.innerHTML += `
            <div class="product-item">
                <img src="${product.image}">
                <div>
                    <h3>${product.title}</h3>
                    <p>${product.price} DH</p>
                    <span class="badge">${product.category}</span>
                </div>
                <div class="action-btns">
                    <button class="edit-btn" onclick="startEdit(${product.id})">Edit</button>
                    <button class="delete-btn" onclick="deleteProduct(${product.id})">Delete</button>
                </div>
            </div>`; 
    }); 
}

loadCategoriesSelect();
checkLogin();
</script>
</body>
</html>
