<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Admin Panel</h2>
    <input type="file" id="imageInput">
    <input type="text" id="title" placeholder="Product Name">
    <input type="text" id="price" placeholder="Price">
    <select id="categorySelect">
        <option value="mojito">Mojito</option>
        <option value="juice">Fresh Juice</option>
        <option value="crepe">Crepe</option>
        <option value="toast">Toast</option>
    </select>
    <button onclick="saveProduct()" style="width:100%; padding:10px; background:green; color:white; border:none;">Save Product</button>
</div>

<script>
    const _supabase = window.supabase.createClient("https://rlwshuurruvtnqwgbjkl.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3NodXVycnV2dG5xd2diamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkzMjAsImV4cCI6MjA5NDg1NTMyMH0.PV4EpbydpLTS36OVyaqy9qANWRec7B9F-emlaS0qqRw");
    let imageData = "";

    document.getElementById('imageInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => { imageData = event.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    });

    async function saveProduct() {
        const product = { 
            title: document.getElementById('title').value, 
            price: document.getElementById('price').value, 
            category: document.getElementById('categorySelect').value,
            image: imageData 
        };
        await _supabase.from('products').insert([product]);
        alert("Added!");
        location.reload();
    }
</script>
</body>
</html>
