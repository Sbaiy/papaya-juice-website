<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>
.product-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fafafa;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
}

.product-item img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

.product-item button{
    width:auto;
    padding:10px 15px;
    background:red;
}
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing: border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#f39c12;
    color:white;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.preview{
    width:100%;
    height:250px;
    object-fit:contain;
    margin-bottom:20px;
    display:none;
}

.login-section{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:#f5f5f5;
}

.error-message{
    color:red;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

.logout-btn{
    background:#d32f2f;
    margin-bottom:20px;
    width:auto;
    padding:10px 20px;
    float:right;
}

.admin-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}
</style>
</head>

<body>

<!-- Login Section -->
<div id="loginSection" class="login-section" style="display:flex;">
    <div class="container">
        <h1>Admin Login</h1>
        <div id="errorMessage" class="error-message" style="display:none;"></div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- Admin Dashboard Section -->
<div id="dashboardSection" style="display:none;">
    <div class="container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="productsList"></div>
        <h1>Add Product</h1>

        <input type="file" id="imageInput">

        <img id="preview" class="preview">

        <input type="text" id="title" placeholder="Product Name">

        <input type="text" id="price" placeholder="Price">

        <button onclick="addProduct()">Add Product</button>
    </div>
</div>

<script>

// Login Credentials (You can change these)
const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "1234";

// Check if user is already logged in
function checkLogin(){
    const isLoggedIn = localStorage.getItem('adminLoggedIn');
    if(isLoggedIn === 'true'){
        showDashboard();
    } else {
        showLogin();
    }
}

function login(){
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');

    if(username === ADMIN_USERNAME && password === ADMIN_PASSWORD){
        localStorage.setItem('adminLoggedIn', 'true');
        showDashboard();
    } else {
        errorMessage.textContent = 'Username or Password is incorrect!';
        errorMessage.style.display = 'block';
    }
}

function logout(){
    localStorage.removeItem('adminLoggedIn');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showLogin();
}

function showLogin(){
    document.getElementById('loginSection').style.display = 'flex';
    document.getElementById('dashboardSection').style.display = 'none';
}

function showDashboard(){
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    loadProducts();
}

// Original Product Management Code
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');

let imageData = "";

imageInput.addEventListener('change', function(){

    const file = this.files[0];

    const reader = new FileReader();

    reader.onload = function(e){

        imageData = e.target.result;

        preview.src = imageData;

        preview.style.display = 'block';

    }

    reader.readAsDataURL(file);

});

function addProduct(){

    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;

    if(!title || !price || !imageData){
        alert('Please fill all fields and select an image!');
        return;
    }

    const product = {
        title,
        price,
        image:imageData
    };

    let products = JSON.parse(localStorage.getItem('products')) || [];

    products.push(product);

    localStorage.setItem('products', JSON.stringify(products));

    document.getElementById('title').value = '';
    document.getElementById('price').value = '';
    imageData = "";
    preview.style.display = 'none';

    loadProducts();

}

function deleteProduct(index){

    let products = JSON.parse(localStorage.getItem('products')) || [];

    products.splice(index,1);

    localStorage.setItem('products', JSON.stringify(products));

    loadProducts();

}

function loadProducts(){

    const productsList = document.getElementById('productsList');

    productsList.innerHTML = "";

    let products = JSON.parse(localStorage.getItem('products')) || [];

    products.forEach((product,index)=>{

        productsList.innerHTML += `

        <div class="product-item">

            <img src="${product.image}">

            <div>

                <h3>${product.title}</h3>

                <p>${product.price} DH</p>

            </div>

            <button onclick="deleteProduct(${index})">
            Delete
            </button>

        </div>

        `;

    });

}

// Check login status when page loads
checkLogin();

</script>
</body>
</html>
