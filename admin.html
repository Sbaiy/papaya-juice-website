<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0 !important;
    padding: 0 !important;
    min-height: 100vh !important;
    font-family: 'Poppins', sans-serif;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    background: linear-gradient(-45deg, #e67e22, #27ae60, #d35400, #1e824c) !important;
    background-size: 400% 400% !important;
    animation: gradientAnimation 20s ease infinite !important;
}

@keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.login-section {
    background: transparent !important;
    width: 100% !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
}
    
.dashboard-section {
    width: 100% !important;
    min-height: 100vh !important;
    display: none;
    box-sizing: border-box;
    padding: 30px;
}

.container {
    max-width: 550px;
    width: 100%;
    margin: auto;
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(12px) !important;
    -webkit-backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(255, 255, 255, 0.25) !important;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    box-sizing: border-box;
}

.logo-container { text-align: center; margin-bottom: 15px; }
.admin-logo { width: 100px; height: auto; border-radius: 50%; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
h1 { text-align: center; margin-bottom: 30px; color: #222; }

input, select {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid rgba(0, 0, 0, 0.15);
    background: rgba(255, 255, 255, 0.8);
    font-size: 16px;
    box-sizing: border-box;
    color: #333;
    font-family: 'Poppins', sans-serif;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    background: #e67e22;
    color: white;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover { background: #d35400; }
.logout-btn { background: #d32f2f; width: auto; padding: 10px 20px; font-size: 16px; }
.logout-btn:hover { background: #b71c1c; }
.error-message { color: red; margin-bottom: 15px; text-align: center; font-weight: bold; }

.product-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.5) !important;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; background: transparent !important; }
.product-item div { flex: 1; margin-left: 15px; }
.product-item h3 { margin: 0 0 5px 0; color: #222; font-size: 16px; }
.product-item p { margin: 0; color: #e67e22; font-weight: bold; font-size: 14px; }
.product-item .badge { background: #27ae60; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px; display: inline-block; margin-top: 4px; }
.product-item button { width: auto; padding: 8px 12px; background: #d32f2f; font-size: 13px; }

.preview { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; display: none; background: transparent !important; }
</style>
</head>
<body>

<div id="loginSection" class="login-section">
    <div class="container">
        <div class="logo-container"><img src="logo.png" class="admin-logo"></div>
        <h1>Admin Login</h1>
        <div id="errorMessage" class="error-message" style="display:none;"></div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="dashboardSection" class="dashboard-section">
    <div class="container">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        
        <div id="productsList"></div>
        
        <h1>Add Product</h1>
        <input type="file" id="imageInput" accept="image/*">
        <img id="preview" class="preview">
        
        <select id="categorySelect">
            <option value="mojito">Mojito</option>
            <option value="juice">Fresh Juice</option>
            <option value="crepe">Crêpe</option>
            <option value="toast">Toast</option>
        </select>
        
        <input type="text" id="title" placeholder="Product Name">
        <input type="text" id="price" placeholder="Price">
        <button onclick="addProduct()">Add Product</button>
    </div>
</div>

<script>
const ADMIN_USERNAME = "sbaiy";
const ADMIN_PASSWORD = "2030";

function checkLogin(){
    if(localStorage.getItem('adminLoggedIn') === 'true') { showDashboard(); } else { showLogin(); }
}
function login(){
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if(u === ADMIN_USERNAME && p === ADMIN_PASSWORD){
        localStorage.setItem('adminLoggedIn', 'true');
        showDashboard();
    } else {
        document.getElementById('errorMessage').textContent = 'Incorrect Credentials!';
        document.getElementById('errorMessage').style.display = 'block';
    }
}
function logout(){ localStorage.removeItem('adminLoggedIn'); showLogin(); }
function showLogin(){
    document.getElementById('loginSection').style.setProperty('display', 'flex', 'important');
    document.getElementById('dashboardSection').style.setProperty('display', 'none', 'important');
}
function showDashboard(){
    document.getElementById('loginSection').style.setProperty('display', 'none', 'important');
    document.getElementById('dashboardSection').style.setProperty('display', 'block', 'important');
    loadProducts();
}

const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
let imageData = "";

imageInput.addEventListener('change', function(){
    const file = this.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(e){
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height, maxSize = 180;
                if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
                else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);
                imageData = canvas.toDataURL('image/png');
                preview.src = imageData; preview.style.display = 'block';
            }
        }
        reader.readAsDataURL(file);
    }
});

function addProduct(){
    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;
    const category = document.getElementById('categorySelect').value;

    if(!title || !price || !imageData){
        alert('Please fill all fields!'); return;
    }

    const product = { title: title, price: price, image: imageData, category: category };

    try {
        let products = JSON.parse(localStorage.getItem('products')) || [];
        products.push(product);
        localStorage.setItem('products', JSON.stringify(products));
        document.getElementById('title').value = '';
        document.getElementById('price').value = '';
        preview.style.display = 'none';
        loadProducts();
    } catch (e) { alert('Storage is full!'); }
}

function deleteProduct(index){
    let products = JSON.parse(localStorage.getItem('products')) || [];
    products.splice(index, 1);
    localStorage.setItem('products', JSON.stringify(products));
    loadProducts();
}

function loadProducts(){
    const list = document.getElementById('productsList');
    list.innerHTML = "";
    let products = JSON.parse(localStorage.getItem('products')) || [];
    products.forEach((product, index)=>{
        list.innerHTML += `
        <div class="product-item">
            <img src="${product.image}">
            <div>
                <h3>${product.title}</h3>
                <p>${product.price} DH</p>
                <span class="badge">${product.category || 'mojito'}</span>
            </div>
            <button onclick="deleteProduct(${index})">Delete</button>
        </div>`;
    });
}
checkLogin();
</script>
</body>
</html>
