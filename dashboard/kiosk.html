<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk — Papaya Juice</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        #ticket { display: none; }
@media print {
    @page { margin: 0; size: 72mm auto; }
    body * { visibility: hidden !important; display: none !important; }
    #ticket { 
        display: block !important;
        visibility: visible !important;
        position: fixed; top: 0; left: 0;
        width: 72mm; padding: 6mm 4mm;
        font-family: monospace; font-size: 11px;
        color: #000 !important; background: #fff !important;
    }
    #ticket * { 
        display: revert !important;
        visibility: visible !important; 
        color: #000 !important;
    }
}
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --card: #1c2128;
            --card-hover: #21262d;
            --border: rgba(255,255,255,0.07);
            --border-active: rgba(255,140,0,0.5);
            --orange: #ff8c00;
            --orange-light: #ffaa33;
            --orange-dim: rgba(255,140,0,0.12);
            --green: #3fb950;
            --red: #f85149;
            --text: #e6edf3;
            --muted: #7d8590;
            --cart-bg: #161b22;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

        /* ── Layout ── */
        .layout { display: flex; height: 100vh; }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width: 220px; min-width: 220px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .brand {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .brand-logo {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: var(--orange);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 15px;
            color: var(--text);
            line-height: 1.1;
        }
        .brand-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

        .nav-title {
            padding: 18px 20px 8px;
            font-size: 10px; font-weight: 600;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px;
        }
        .nav-list { padding: 0 10px; flex: 1; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            cursor: pointer; margin-bottom: 2px;
            transition: background 0.15s, color 0.15s;
            font-size: 13.5px; color: var(--muted);
            position: relative;
        }
        .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        .nav-item.active {
            background: var(--orange-dim);
            color: var(--orange-light);
        }
        .nav-item.active .nav-dot { background: var(--orange); }
        .nav-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .nav-emoji { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
        .nav-count {
            margin-left: auto; background: var(--card);
            font-size: 11px; padding: 1px 6px; border-radius: 10px;
            color: var(--muted);
        }
        .nav-item.active .nav-count { background: rgba(255,140,0,0.2); color: var(--orange); }

        .user-block {
            padding: 14px 12px;
            border-top: 1px solid var(--border);
        }
        .user-card {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }
        .user-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
            color: white; flex-shrink: 0;
        }
        .user-name { font-size: 13px; font-weight: 500; }
        .user-role { font-size: 11px; color: var(--muted); }
        .btn-action {
            width: 100%; padding: 8px 12px;
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); border-radius: 8px; cursor: pointer;
            font-size: 12px; text-align: left;
            display: flex; align-items: center; gap: 8px;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 4px;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-action:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        .btn-action.danger { color: var(--red); border-color: rgba(248,81,73,0.2); }
        .btn-action.danger:hover { background: rgba(248,81,73,0.08); }

        /* ── MAIN ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .topbar {
            height: 58px; background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px; gap: 14px;
            flex-shrink: 0;
        }
        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px; font-weight: 700;
        }
        .search-wrap { position: relative; flex: 1; max-width: 340px; }
        .search-input {
            width: 100%; padding: 8px 14px 8px 36px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-size: 13px; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.15s;
        }
        .search-input:focus { border-color: var(--orange); }
        .search-input::placeholder { color: var(--muted); }
        .search-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            color: var(--muted); font-size: 14px; pointer-events: none;
        }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
        .status-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .clock { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

        .content-area {
            flex: 1; overflow-y: auto; padding: 18px 18px;
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title {
            font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
        }
        .section-sub { font-size: 12px; color: var(--muted); }

        /* ── PRODUCT GRID ── */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 12px;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
            display: flex; flex-direction: column;
        }
        .product-card:hover {
            border-color: var(--border-active);
            background: var(--card-hover);
            transform: translateY(-2px);
        }
        .product-card.unavailable { opacity: 0.45; pointer-events: none; }

        .product-img-area {
            background: #fff;
            height: 130px;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .product-img-area img {
            max-height: 100px; max-width: 100%;
            object-fit: contain;
            transition: transform 0.25s ease;
        }
        .product-card:hover .product-img-area img { transform: scale(1.06); }
        .product-placeholder {
            font-size: 44px; opacity: 0.5;
        }

        .badge-unavailable {
            position: absolute; top: 8px; left: 8px;
            background: rgba(248,81,73,0.9); color: white;
            font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
        }

        .product-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .product-cat {
            font-size: 10px; color: var(--orange); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px;
        }
        .product-name {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
            color: var(--text); line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-desc {
            font-size: 11px; color: var(--muted); line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; flex: 1;
        }
        .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .product-price {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
            color: var(--orange);
        }
        .btn-add {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--orange); border: none; color: white;
            font-size: 18px; font-weight: 300; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.15s;
            line-height: 1;
        }
        .btn-add:hover { background: var(--orange-light); transform: scale(1.1); }
        .btn-add:active { transform: scale(0.92); }

        /* Skeleton loader */
        .skeleton {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
        }
        .skel-img { height: 130px; background: var(--card-hover); }
        .skel-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .skel-line {
            height: 10px; border-radius: 4px; background: var(--card-hover);
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .skel-line.w60 { width: 60%; }
        .skel-line.w80 { width: 80%; }
        .skel-line.w40 { width: 40%; }

        /* Empty / Error state */
        .state-msg {
            grid-column: 1 / -1;
            text-align: center; padding: 50px 20px; color: var(--muted);
        }
        .state-icon { font-size: 40px; margin-bottom: 10px; }
        .state-title { font-size: 15px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
        .state-sub { font-size: 13px; }

        /* ── CART SIDEBAR ── */
        .cart-sidebar {
            width: 300px; min-width: 300px;
            background: var(--cart-bg);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .cart-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .cart-title {
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
        }
        .cart-badge {
            margin-left: auto; background: var(--orange); color: white;
            font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
            display: none;
        }
        .cart-badge.show { display: inline-block; }

        .cart-body { flex: 1; overflow-y: auto; padding: 12px; }
        .cart-empty {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--muted); gap: 8px; text-align: center;
            padding: 20px;
        }
        .cart-empty-icon { font-size: 36px; opacity: 0.5; }
        .cart-empty-text { font-size: 13px; }

        .cart-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 8px;
        }
        .cart-item-img {
            width: 44px; height: 44px; border-radius: 8px;
            background: white; object-fit: contain; flex-shrink: 0;
        }
        .cart-item-img-placeholder {
            width: 44px; height: 44px; border-radius: 8px;
            background: var(--card-hover); display: flex; align-items: center;
            justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item-price { font-size: 12px; color: var(--orange); font-weight: 600; }
        .cart-item-controls { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
        .qty-btn {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--card-hover); border: 1px solid var(--border);
            color: var(--text); cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }
        .qty-btn:hover { background: var(--border); }
        .qty-val { font-size: 12px; font-weight: 600; min-width: 16px; text-align: center; }
        .cart-item-remove {
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 14px; padding: 2px;
            line-height: 1; transition: color 0.15s;
            flex-shrink: 0;
        }
        .cart-item-remove:hover { color: var(--red); }

        .cart-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
        }
        .cart-summary { margin-bottom: 12px; }
        .cart-row {
            display: flex; justify-content: space-between;
            font-size: 12.5px; color: var(--muted);
            padding: 3px 0;
        }
        .cart-row.total {
            font-size: 14px; font-weight: 700; color: var(--text);
            border-top: 1px solid var(--border); margin-top: 8px; padding-top: 10px;
        }
        .cart-row.total span:last-child { color: var(--orange); }
        .btn-order {
            width: 100%; padding: 12px;
            background: var(--orange); border: none;
            border-radius: 10px; color: white;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: background 0.15s, transform 0.1s;
        }
        .btn-order:hover { background: var(--orange-light); }
        .btn-order:active { transform: scale(0.98); }
        .btn-order:disabled {
            background: var(--card-hover); color: var(--muted); cursor: not-allowed;
        }
        .btn-clear {
            width: 100%; padding: 8px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--muted);
            font-size: 12px; cursor: pointer;
            margin-top: 6px; transition: background 0.15s, color 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-clear:hover { background: rgba(248,81,73,0.08); color: var(--red); border-color: rgba(248,81,73,0.3); }

        /* ── TABLE SELECTOR ── */
        .table-row {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .table-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
        .table-select {
            flex: 1; padding: 6px 10px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 12px;
            font-family: 'DM Sans', sans-serif; outline: none;
            cursor: pointer;
        }
        .table-select:focus { border-color: var(--orange); }

        /* ── ORDER SUCCESS TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1c2128; border: 1px solid var(--green);
            color: var(--text); padding: 12px 22px; border-radius: 12px;
            font-size: 13.5px; font-weight: 500; z-index: 999;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
<script>
if (sessionStorage.getItem('papaya_auth') !== '1') {
    window.location.replace('/dashboard');
}
</script>

<div class="layout">

    <!-- ── LEFT SIDEBAR ── -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-icon">🍹</div>
                <div>
                    <div class="brand-name">Papaya Juice</div>
                    <div class="brand-sub">Point de vente</div>
                </div>
            </div>
        </div>

        <div class="nav-title">Catégories</div>
        <nav class="nav-list" id="categoryNav">
            <div class="nav-item active" data-cat="" onclick="filterCategory(this, '')">
                <span class="nav-emoji">🌟</span>
                <span>Tous les produits</span>
                <span class="nav-count" id="count-all">—</span>
            </div>
        </nav>

        <div class="user-block">
            <div class="user-card">
                <div class="user-avatar" id="userInitial">M</div>
                <div>
                    <div class="user-name" id="userName">Mohammed</div>
                    <div class="user-role">Serveur</div>
                </div>
            </div>
            <button class="btn-action" onclick="location.href='/dashboard/commandes-live'">📋 Historique des commandes</button>
            <button class="btn-action" onclick="location.href='/dashboard'">🪑 Suivie des tables</button>
            <button class="btn-action" onclick="location.href='/dashboard'">🔒 Clôture</button>
            <button class="btn-action danger" onclick="API.Auth.logout()">🚪 Déconnexion</button>
        </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">
        <header class="topbar">
            <div class="topbar-title">Caisse</div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput"
                    placeholder="Rechercher un produit..."
                    oninput="filterSearch(this.value)">
            </div>
            <div class="topbar-right">
                <span class="status-label"><span class="status-dot"></span> En ligne</span>
                <span class="clock" id="clock">—</span>
            </div>
        </header>

        <div class="content-area">
            <div class="section-header">
                <div>
                    <div class="section-title" id="sectionTitle">Tous les produits</div>
                    <div class="section-sub" id="sectionSub">Chargement…</div>

            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Skeletons -->
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w60"></div><div class="skel-line w80"></div><div class="skel-line w40"></div></div></div>
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w60"></div><div class="skel-line w80"></div><div class="skel-line w40"></div></div></div>
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w40"></div><div class="skel-line w60"></div></div></div>
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w40"></div><div class="skel-line w80"></div><div class="skel-line w60"></div></div></div>
                <div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
            </div>

    <!-- ── CART SIDEBAR ── -->
    <aside class="cart-sidebar">
        <div class="cart-header">
            <span style="font-size:18px">🛒</span>
            <span class="cart-title">Commande en cours</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>

        <div class="cart-body" id="cartBody">
            <div class="cart-empty" id="cartEmpty">
                <div class="cart-empty-icon">🛒</div>
                <div class="cart-empty-text">Panier vide<br><span style="font-size:11px;opacity:0.6">Cliquez sur un produit pour l'ajouter</span></div>
            </div>
            <div id="cartItems" style="display:none"></div>
        </div>

        <div class="cart-footer">
            <div class="table-row">
                <span class="table-label">🪑 Table</span>
                <select class="table-select" id="tableSelect">
                    <option value="">— Sélectionner —</option>
                    <option value="emporter">À emporter</option>
                    <option value="comptoir">Comptoir</option>
                    <script>for(let i=1;i<=20;i++)document.write(`<option value="T${i}">Table ${i}</option>`)</script>
                </select>

            <div class="cart-summary" id="cartSummary" style="display:none">
                <div class="cart-row"><span>Sous-total</span><span id="subtotal">0.00 DH</span></div>
                <div class="cart-row total"><span>Total</span><span id="total">0.00 DH</span></div>
            </div>

    </aside>
</div>

<div class="toast" id="toast"></div>

<!-- Include API helper -->
<script src="api.js"></script>

<script>
// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let allProducts = [];
let filteredProducts = [];
let currentCategory = '';
let searchQuery = '';
let cart = [];           // [{product, qty}]
let categoryMap = {};    // name → count

// ─────────────────────────────────────────
//  CLOCK
// ─────────────────────────────────────────
function updateClock() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('clock').textContent =
        `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
updateClock();
setInterval(updateClock, 30000);

// ─────────────────────────────────────────
//  AUTH CHECK
// ─────────────────────────────────────────
(function() {
    if (typeof API === 'undefined') return; // fallback si api.js pas chargé
    const user = API.Auth.getUser();
    if (user) {
        document.getElementById('userName').textContent = user.fullname || user.username || 'Serveur';
        const initials = (user.fullname || user.username || 'S').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
        document.getElementById('userInitial').textContent = initials;
    }
})();

// ─────────────────────────────────────────
//  LOAD PRODUCTS
// ─────────────────────────────────────────
async function loadProducts() {
    try {
        const data = await API.menu.getAll();
        allProducts = data || [];

        // Build category map
        categoryMap = {};
        allProducts.forEach(p => {
            categoryMap[p.category] = (categoryMap[p.category] || 0) + 1;
        });

        // Update count-all
        document.getElementById('count-all').textContent = allProducts.length;

        // Build category nav
        buildCategoryNav();

        // Render
        filteredProducts = allProducts;
        renderProducts();

    } catch(err) {
        console.error('Erreur chargement produits:', err);
        document.getElementById('productsGrid').innerHTML = `
            <div class="state-msg">
                <div class="state-icon">⚠️</div>
                <div class="state-title">Impossible de charger les produits</div>
                <div class="state-sub">${err.message}</div>
            </div>`;
        document.getElementById('sectionSub').textContent = 'Erreur de connexion';
    }
}

// ─────────────────────────────────────────
//  BUILD CATEGORY NAV
// ─────────────────────────────────────────
const CATEGORY_ICONS = {
    'Boissons Chaudes': '☕',
    'Café': '☕',
    'Jus Nature': '🥤',
    'Jus': '🍊',
    'Restaurant': '🍽️',
    'Petits Déjeuners': '🥐',
    'Déjeuner': '🥗',
    'Dîner': '🍴',
    'Desserts': '🍰',
    'Snacks': '🥨',
    'Sandwichs': '🥪',
    'Pizzas': '🍕',
    'Burgers': '🍔',
    'Salades': '🥗',
    'Boissons Froides': '🧊',
    'Smoothies': '🫙',
    'Milkshakes': '🥛',
};
function getCatIcon(cat) {
    return CATEGORY_ICONS[cat] || '🍴';
}

function buildCategoryNav() {
    const nav = document.getElementById('categoryNav');
    // keep first item (Tous)
    const firstItem = nav.querySelector('.nav-item');
    nav.innerHTML = '';
    nav.appendChild(firstItem);

    const cats = Object.keys(categoryMap).sort();
    cats.forEach(cat => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.cat = cat;
        item.onclick = () => filterCategory(item, cat);
        item.innerHTML = `
            <span class="nav-emoji">${getCatIcon(cat)}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
            <span class="nav-count">${categoryMap[cat]}</span>`;
        nav.appendChild(item);
    });
}

// ─────────────────────────────────────────
//  FILTER
// ─────────────────────────────────────────
function filterCategory(el, cat) {
    currentCategory = cat;
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sectionTitle').textContent = cat || 'Tous les produits';
    applyFilters();
}

function filterSearch(q) {
    searchQuery = q.toLowerCase().trim();
    applyFilters();
}

function applyFilters() {
    filteredProducts = allProducts.filter(p => {
        const matchCat = !currentCategory || p.category === currentCategory;
        const matchSearch = !searchQuery
            || p.title.toLowerCase().includes(searchQuery)
            || (p.description || '').toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
    });
    renderProducts();
}

// ─────────────────────────────────────────
//  RENDER PRODUCTS
// ─────────────────────────────────────────
function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const sub = document.getElementById('sectionSub');
    sub.textContent = `${filteredProducts.length} produit${filteredProducts.length !== 1 ? 's' : ''}`;

    if (!filteredProducts.length) {
        grid.innerHTML = `
            <div class="state-msg">
                <div class="state-icon">🔍</div>
                <div class="state-title">Aucun produit trouvé</div>
                <div class="state-sub">Essayez une autre recherche ou catégorie</div>
            </div>`;
        return;
    }

    grid.innerHTML = filteredProducts.map(p => {
        const imgHtml = p.image
            ? `<img src="${p.image}" alt="${p.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : '';
        const placeholderStyle = p.image ? 'display:none' : '';
        const placeholderIcon = getCatIcon(p.category);
        const unavailable = p.disponible === false;

        return `
        <div class="product-card${unavailable ? ' unavailable' : ''}"
             onclick="${unavailable ? '' : `addToCart(${p.id})`}">
            <div class="product-img-area">
                ${imgHtml}
                <div class="product-placeholder" style="${placeholderStyle}">${placeholderIcon}</div>
                ${unavailable ? '<div class="badge-unavailable">Indisponible</div>' : ''}
            </div>
            <div class="product-body">
                <div class="product-cat">${p.category}</div>
                <div class="product-name">${p.title}</div>
                <div class="product-desc">${p.description || ''}</div>
                <div class="product-footer">
                    <div class="product-price">${Number(p.price).toFixed(2)} DH</div>
                    <button class="btn-add" aria-label="Ajouter">+</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ─────────────────────────────────────────
//  CART
// ─────────────────────────────────────────
function addToCart(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (!product) return;

    const existing = cart.find(i => i.product.id === productId);
    if (existing) {
        existing.qty++;
    } else {
        cart.push({ product, qty: 1 });
    }
    renderCart();

    // Pop animation
    const cards = document.querySelectorAll('.product-card');
    cards.forEach(card => {
        if (card.onclick && card.onclick.toString().includes(productId)) {
            const btn = card.querySelector('.btn-add');
            if (btn) {
                btn.style.transform = 'scale(1.4)';
                setTimeout(() => btn.style.transform = '', 200);
            }
        }
    });
}

function changeQty(productId, delta) {
    const idx = cart.findIndex(i => i.product.id === productId);
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    renderCart();
}

function removeItem(productId) {
    cart = cart.filter(i => i.product.id !== productId);
    renderCart();
}

function clearCart() {
    cart = [];
    renderCart();
}

function renderCart() {
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    const badge = document.getElementById('cartBadge');
    badge.textContent = totalQty;
    badge.classList.toggle('show', totalQty > 0);

    const empty = document.getElementById('cartEmpty');
    const items = document.getElementById('cartItems');
    const summary = document.getElementById('cartSummary');
    const btnOrder = document.getElementById('btnOrder');

    if (!cart.length) {
        empty.style.display = 'flex';
        items.style.display = 'none';
        summary.style.display = 'none';
        btnOrder.disabled = true;
        return;
    }

    empty.style.display = 'none';
    items.style.display = 'block';
    summary.style.display = 'block';
    btnOrder.disabled = false;

    items.innerHTML = cart.map(({ product: p, qty }) => {
        const imgEl = p.image
            ? `<img class="cart-item-img" src="${p.image}" alt="${p.title}" onerror="this.style.display='none'">`
            : `<div class="cart-item-img-placeholder">${getCatIcon(p.category)}</div>`;
        return `
        <div class="cart-item">
            ${imgEl}
            <div class="cart-item-info">
                <div class="cart-item-name">${p.title}</div>
                <div class="cart-item-price">${(p.price * qty).toFixed(2)} DH</div>
                <div class="cart-item-controls">
                    <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                    <span class="qty-val">${qty}</span>
                    <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
                </div>
            </div>
            <button class="cart-item-remove" onclick="removeItem(${p.id})" aria-label="Supprimer">✕</button>
        </div>`;
    }).join('');

    const sub = cart.reduce((s, i) => s + i.product.price * i.qty, 0);
    document.getElementById('subtotal').textContent = sub.toFixed(2) + ' DH';
    document.getElementById('total').textContent = sub.toFixed(2) + ' DH';
}

// ─────────────────────────────────────────
//  SUBMIT ORDER
// ─────────────────────────────────────────
async function submitOrder() {
    if (!cart.length) return;
    const table = document.getElementById('tableSelect').value;
    const btnOrder = document.getElementById('btnOrder');

    btnOrder.disabled = true;
    btnOrder.textContent = 'Envoi…';

    try {
        const orderPayload = {
            table_number: table || 'Comptoir',
            items: cart.map(({ product, qty }) => ({
                id: product.id,
                title: product.title,
                price: parseFloat(product.price),
                qty
            })),
            total: cart.reduce((s, i) => s + parseFloat(i.product.price) * i.qty, 0),
            status: 'pending'
        };

        // 1. Sifet l'commande l Dashboard Live
        await API.orders.create(orderPayload);
        showToast('✅ Commande envoyée avec succès !');

        // 2. Rempli ticket
        const now = new Date();
        const pad = n => String(n).padStart(2,'0');
        const dateStr = pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());
        const tableVal = document.getElementById('tableSelect').value || 'Comptoir';
        const ticketLines = cart.map(({product:p, qty}) =>
            `<tr><td>${p.title}</td><td style="text-align:center">${qty}</td><td style="text-align:right">${(p.price*qty).toFixed(2)}</td></tr>`
        ).join('');
        const ticketTotal = cart.reduce((s,i)=>s+i.product.price*i.qty,0).toFixed(2);
        document.getElementById('ticket').innerHTML = `
            <div style="text-align:center;margin-bottom:6px">
                <div style="font-size:15px;font-weight:bold">PAPAYA JUICE</div>
                <div style="font-size:10px">${dateStr}</div>
                <div style="font-size:10px">Table: <b>${tableVal}</b></div>
            </div>
            <hr style="border:1px dashed #000;margin:4px 0">
            <table style="width:100%;border-collapse:collapse;font-size:11px">
                <thead><tr><th style="text-align:left">Article</th><th>Qte</th><th style="text-align:right">Prix</th></tr></thead>
                <tbody>${ticketLines}</tbody>
            </table>
            <hr style="border:1px dashed #000;margin:4px 0">
            <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:13px">
                <span>TOTAL</span><span>${ticketTotal} DH</span>
            </div>
            <div style="text-align:center;margin-top:8px;font-size:10px">Merci de votre visite!</div>`;

        // 3. Print auto
        window.print();

        // 4. Redirect + clear
        setTimeout(() => { clearCart(); }, 800);
    } catch(err) {
        showToast('❌ Erreur: ' + err.message);
        btnOrder.disabled = false;
    }

    btnOrder.textContent = 'Envoyer la commande';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    if (typeof API !== 'undefined') {
        loadProducts();
    } else {
        // fallback si api.js pas disponible — charge depuis le backend direct
        window.API = {
            menu: {
                getAll: async () => {
                    const res = await fetch('https://papaya-juice-backend-production.up.railway.app/api/menu/products');
                    if (!res.ok) throw new Error('Erreur serveur');
                    return res.json();
                }
            },
            orders: {
                create: async (order) => {
                    const res = await fetch('https://papaya-juice-backend-production.up.railway.app/api/orders', {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify(order)
                    });
                    if (!res.ok) throw new Error('Erreur envoi commande');
                    return res.json();
                }
            },
            Auth: {
                getUser: () => JSON.parse(sessionStorage.getItem('papaya_user') || 'null'),
                logout: () => { sessionStorage.clear(); location.href = '/'; }
            }
        };
        loadProducts();
    }
});
</script>

<div id="ticket"></div>
