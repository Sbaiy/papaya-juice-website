<style>
:root {
    --primary: #c0392b;
    --dark-bg: #1b2e1e;
    --input-bg: rgba(255, 255, 255, 0.06);
    --border-color: rgba(255, 255, 255, 0.1);
}

body { 
    margin: 0 !important; padding: 0 !important; min-height: 100vh !important; font-family: 'Poppins', sans-serif; 
    display: flex !important; justify-content: center !important; align-items: flex-start !important; 
    background-color: var(--dark-bg) !important;
    background-attachment: fixed;
    color: #eceff1;
}
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 55% 40% at 15% 85%, rgba(249,115,22,.08) 0%, transparent 70%), radial-gradient(ellipse 45% 35% at 85% 15%, rgba(249,115,22,.06) 0%, transparent 65%); pointer-events: none; }

.dashboard-section { width: 100% !important; min-height: 100vh !important; box-sizing: border-box; padding: 30px 15px; }

.dashboard-container { 
    max-width: 1200px; width: 100%; margin: 0 auto; 
    background: rgba(255, 255, 255, 0.05) !important; 
    backdrop-filter: blur(15px) !important; 
    border: 1px solid var(--border-color) !important; 
    padding: 30px; border-radius: 24px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
    box-sizing: border-box; 
}

.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

h1 { text-align: center; margin-bottom: 25px; color: #ffffff; font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
.form-grid input, .form-grid select { margin-bottom: 0; }

input, select { 
    width: 100%; padding: 12px 15px; margin-bottom: 15px; border-radius: 8px; 
    border: 1px solid var(--border-color); background: var(--input-bg) !important; 
    font-size: 14px; box-sizing: border-box; color: #ffffff !important; transition: all 0.3s ease;
}
input:focus, select:focus { outline: none; border-color: var(--primary) !important; background: rgba(255, 255, 255, 0.1) !important; }
select option { background: #1a241c; color: #fff; }

.main-btn { width: 100%; padding: 14px; border: none; background: var(--primary); color: white; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.3s ease; }
.main-btn:hover { background: #a93226; }

.back-btn { 
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; 
    width: auto; padding: 8px 16px; font-size: 14px; border-radius: 6px; cursor: pointer; 
    transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }

.preview { width: 100px; height: 100px; object-fit: contain; margin-bottom: 15px; display: none; background: #fff; border-radius: 8px; padding: 5px; }
.cancel-edit-btn { background: #566573; margin-top: 10px; display: none; width: 100%; padding: 14px; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
.cancel-edit-btn:hover { background: #46515c; }

.category-container { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; grid-column: span 2; }
.category-container select { margin-bottom: 0 !important; flex: 1; }
.cat-btn { padding: 12px 18px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; }
.add-cat-btn { background: #27ae60; } .add-cat-btn:hover { background: #219a52; }
.del-cat-btn { background: #c0392b; } .del-cat-btn:hover { background: #a93226; }

.white-table-container {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 12px;
    margin-top: 35px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

.table-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(226, 112, 26, 0.08);
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    flex-wrap: wrap;
    gap: 10px;
}

.table-title {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #eceff1;
    font-weight: 700;
    font-size: 15px;
}

.table-filter select {
    margin: 0;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.15) !important;
    background: rgba(255,255,255,0.08) !important;
    color: #eceff1 !important;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    width: auto;
    cursor: pointer;
}

.table-scroll-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.custom-table {
    width: 100%;
    min-width: 700px;
    border-collapse: collapse;
    background: transparent;
    color: #eceff1;
    text-align: left;
    font-size: 13px;
}

.custom-table th {
    background: transparent;
    padding: 15px 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    white-space: nowrap;
}

.custom-table td {
    padding: 15px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: middle;
}

.custom-table tr:hover { background: rgba(255,255,255,0.04); }

.td-id {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    white-space: nowrap;
}
.drag-icon { 
    color: rgba(255,255,255,0.35); font-weight: bold; font-size: 18px; cursor: grab; 
    user-select: none; padding: 4px; border-radius: 4px; transition: 0.2s;
}
.drag-icon:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.custom-table tr.dragging { opacity: 0.4; background: rgba(226,112,26,0.15) !important; }
.custom-table tr.drag-over { border-top: 2px solid #e2701a !important; }
.delete-icon { cursor: pointer; transition: 0.2s; display: flex; align-items: center;}
.delete-icon:hover { transform: scale(1.1); }

.td-img { position: relative; width: 45px; }
.td-img img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; transition: opacity 0.2s; }
.td-img img:hover { opacity: 0.75; }
.img-badge {
    position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; width: 16px; height: 16px;
    border-radius: 50%; font-size: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold;
}

.td-cat { font-weight: 600; color: #eceff1; white-space: nowrap; cursor: pointer; }
.td-cat:hover { color: var(--primary); }
.td-name, .td-desc { display: flex; align-items: center; gap: 6px; font-weight: 600; color: #eceff1; cursor: pointer; }
.td-desc { color: rgba(255,255,255,0.5); font-weight: 400; }
.td-name:hover, .td-desc:hover { color: var(--primary); }

.td-price { font-weight: 700; color: #ffffff !important; line-height: 1.2; cursor: pointer; white-space: nowrap; }
.td-price:hover { color: #e67e22 !important; }
.td-price .dh { color: rgba(255,255,255,0.35) !important; font-weight: 400; font-size: 11px; margin-left: 2px; }

.custom-table tbody tr:hover {
    background: rgba(230, 126, 34, 0.08) !important;
    border-left: 3px solid #e67e22;
}

.switch { position: relative; display: inline-block; width: 42px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: #2ecc71; }
input:checked + .slider:before { transform: translateX(18px); }

.inline-input {
    width: 100%; padding: 5px 8px; border: 2px solid var(--primary);
    border-radius: 6px; font-size: 13px; font-weight: 600; color: #ffffff;
    background: rgba(255,255,255,0.1); outline: none; box-sizing: border-box;
}
.price-input {
    width: 80px; padding: 4px 6px; border: 2px solid var(--primary);
    border-radius: 6px; font-size: 13px; font-weight: 700; color: #ffffff;
    background: rgba(255,255,255,0.1); text-align: center; outline: none;
}

tr.indisponible td { opacity: 0.45; }
tr.indisponible .switch { opacity: 1 !important; }

@media (max-width: 768px) {
    .dashboard-section { padding: 15px 10px; }
    .dashboard-container { padding: 15px 12px; border-radius: 16px; }
    .admin-header { flex-direction: row; align-items: center; margin-bottom: 20px; }
    .admin-header h1 { font-size: 17px; margin-bottom: 0; text-align: left; }
    .form-grid { grid-template-columns: 1fr; }
    .category-container { grid-column: span 1; }
    .table-scroll-wrapper { border-radius: 0 0 12px 12px; }
    .custom-table { font-size: 12px; }
    .custom-table th { padding: 10px 12px; font-size: 10px; }
    .custom-table td { padding: 10px 12px; }
    .td-id { gap: 5px; font-size: 11px; }
    .td-img img { width: 34px; height: 34px; }
    .switch { width: 36px; height: 20px; }
    .slider:before { height: 14px; width: 14px; }
    input:checked + .slider:before { transform: translateX(16px); }
}
</style>

<script>
if (!localStorage.getItem('papaya_token')) {
    window.location.replace('/dashboard');
}
// ── Vérification token expiré ──
(function checkTokenExpiry() {
  const token = localStorage.getItem('papaya_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    // Token expiré
    if (payload.exp && Date.now() / 1000 > payload.exp) {
      localStorage.removeItem('papaya_token');
      localStorage.removeItem('papaya_user');
      sessionStorage.removeItem('papaya_auth');
      sessionStorage.removeItem('papaya_user');
      alert('Votre session a expiré. Veuillez vous reconnecter.');
      window.location.replace('/dashboard');
      return;
    }
    // Pas propriétaire
    if (payload.role && payload.role !== 'owner') {
      alert('⚠️ Accès refusé — cette page est réservée au propriétaire.\nVeuillez vous connecter avec le compte propriétaire.');
      localStorage.removeItem('papaya_token');
      localStorage.removeItem('papaya_user');
      sessionStorage.removeItem('papaya_auth');
      sessionStorage.removeItem('papaya_user');
      window.location.replace('/dashboard');
    }
  } catch(e) { localStorage.removeItem('papaya_token'); window.location.replace('/dashboard'); }
})();
</script>

<script>
const SUPABASE_URL = "https://rlwshuurruvtnqwgbjkl.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3NodXVycnV2dG5xd2diamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzkzMjAsImV4cCI6MjA5NDg1NTMyMH0.PV4EpbydpLTS36OVyaqy9qANWRec7B9F-emlaS0qqRw"; 
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Broadcast menu update to all connected clients (menu pages) ──
let _broadcastChannel = null;
function getBroadcastChannel() {
  if (!_broadcastChannel) {
    _broadcastChannel = _supabase.channel('papaya-broadcast');
    _broadcastChannel.subscribe();
  }
  return _broadcastChannel;
}
async function broadcastMenuUpdate() {
  try {
    await getBroadcastChannel().send({
      type: 'broadcast',
      event: 'menu_updated',
      payload: { ts: Date.now() }
    });
  } catch(e) { console.warn('Broadcast failed:', e); }
}
const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000'
  : 'https://papaya-juice-backend-production.up.railway.app';
const getToken = () => localStorage.getItem('papaya_token');
const apiH = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() });
async function apiCall(method, path, body) {
  const res = await fetch(BACKEND_URL + path, { method, headers: apiH(), body: body ? JSON.stringify(body) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erreur');
  return data;
}

// ─── Cloudinary Upload ──────────────────────────────────────
const CLOUDINARY_CLOUD = "ddo0srqrv";
const CLOUDINARY_PRESET = "papaya_products"; // unsigned preset — créer dans Cloudinary dashboard

async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_PRESET);
    fd.append("folder", "papaya-juice/products");
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Cloudinary upload failed");
    return data.secure_url;
}
// ────────────────────────────────────────────────────────────

let dbCategories = []; // loaded from categories table

let currentEditingProductId = null; 
let globalProductsArray = []; 

let dragSrcId = null;

function startDrag(e, id) {
    const row = document.getElementById('row-' + id);
    dragSrcId = id;
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', onDragStart, { once: true });
    row.addEventListener('dragend', onDragEnd, { once: true });
}

function onDragStart(e) {
    e.dataTransfer.effectAllowed = 'move';
    this.classList.add('dragging');
}

function onDragEnd(e) {
    this.classList.remove('dragging');
    this.setAttribute('draggable', 'false');
    document.querySelectorAll('.custom-table tr').forEach(r => r.classList.remove('drag-over'));
    saveOrder();
}

document.addEventListener('dragover', function(e) {
    e.preventDefault();
    const target = e.target.closest('tr[data-id]');
    if (!target || target.dataset.id == dragSrcId) return;
    document.querySelectorAll('.custom-table tr').forEach(r => r.classList.remove('drag-over'));
    target.classList.add('drag-over');
    const tbody = target.parentNode;
    const dragRow = document.getElementById('row-' + dragSrcId);
    const rows = [...tbody.querySelectorAll('tr')];
    const targetIdx = rows.indexOf(target);
    const dragIdx = rows.indexOf(dragRow);
    if (dragIdx < targetIdx) { tbody.insertBefore(dragRow, target.nextSibling); }
    else { tbody.insertBefore(dragRow, target); }
});

async function saveOrder() {
    const rows = document.querySelectorAll('.custom-table tbody tr[data-id]');
    const orderedIds = [...rows].map(r => parseInt(r.dataset.id));
    try {
        await apiCall('PUT', '/api/menu/products/reorder', { ids: orderedIds });
        localStorage.setItem('productOrder', JSON.stringify(orderedIds));
    } catch(e) {
        if (e.message && e.message.includes('propriétaire')) {
            if (confirm('⚠️ Session expirée — veuillez vous reconnecter pour sauvegarder l\'ordre.')) {
                localStorage.removeItem('papaya_token'); localStorage.removeItem('papaya_user');
                sessionStorage.removeItem('papaya_auth'); sessionStorage.removeItem('papaya_user');
                window.location.replace('/dashboard');
            }
        } else {
            alert('Erreur sauvegarde ordre: ' + e.message);
        }
        loadProducts(); // reset visually to DB order
    }
}

function filterTableByCategory(category) {
    const rows = document.querySelectorAll('.custom-table tbody tr');
    rows.forEach(row => {
        if (category === 'all') { row.style.display = ''; }
        else {
            const catCell = row.querySelector('.td-cat');
            row.style.display = (catCell && catCell.textContent.trim() === category) ? '' : 'none';
        }
    });
}

async function loadCategoriesSelect(keepValue) {
    const select = document.getElementById('categorySelect');
    const prev = keepValue || select.value;
    const { data, error } = await _supabase.from('categories').select('*').order('sort_order', { ascending: true });
    if (!error && data) { dbCategories = data; }
    select.innerHTML = "<option value='' disabled selected>Sélectionner une catégorie</option>";
    dbCategories.forEach(cat => {
        const label = cat.name_fr || cat.name_en || cat.name_ar || 'Sans nom';
        select.innerHTML += `<option value="${label}">${label}</option>`;
    });
    // Restaurer la valeur précédente (le label stocké dans products.category)
    if (prev) {
        select.value = prev;
        // Si la valeur n'existe plus (catégorie renommée), ne pas bloquer
        if (!select.value && dbCategories.length > 0) {
            select.selectedIndex = 0;
        }
    }
}

function addNewCategory() {
    if (confirm('Pour gérer les catégories, vous serez redirigé vers la page Catégories.')) {
        window.open('/dashboard/categories', '_blank');
    }
}

function deleteCurrentCategory() {
    alert('Pour supprimer une catégorie, utilisez la page Catégories (/dashboard/categories).');
}

const imageInput = document.getElementById('imageInput'); 
const preview = document.getElementById('preview'); 
let imageData = "";

imageInput.addEventListener('change', async function(){
    const file = this.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file); preview.style.display = 'block';
    try {
        document.getElementById('submitProductBtn').disabled = true;
        document.getElementById('submitProductBtn').textContent = "⏳ Uploading…";
        imageData = await uploadToCloudinary(file);
    } catch(err) {
        alert('❌ Image upload failed: ' + err.message);
        imageData = "";
    } finally {
        document.getElementById('submitProductBtn').disabled = false;
        document.getElementById('submitProductBtn').textContent = currentEditingProductId ? "Save Changes" : "+ Add Item";
    }
});

async function handleSubmit() { if (currentEditingProductId === null) { await addProduct(); } else { await updateProduct(); } }

async function addProduct(){ 
    const title = document.getElementById('title').value; 
    const description = document.getElementById('description').value || "-"; 
    const price = document.getElementById('price').value;
    const price_kiosk = document.getElementById('price_kiosk').value;
    const category = document.getElementById('categorySelect').value; 
    if(!title || !price || !imageData || !category){ alert('Please fill in all required fields!'); return; } 
    try { await apiCall('POST', '/api/menu/products', { title, price, price_kiosk: price_kiosk || null, image: imageData, category, description, disponible: true }); localStorage.removeItem('papaya_menu_cache'); await broadcastMenuUpdate(); clearForm(category); await new Promise(r => setTimeout(r, 600)); await loadProducts(); } catch(e) { alert('Error saving data: ' + e.message); } 
}

async function startEdit(id) {
    const product = globalProductsArray.find(p => p.id === id);
    if (!product) return;
    currentEditingProductId = id;
    document.getElementById('formTitle').textContent = "Edit Item";
    document.getElementById('submitProductBtn').textContent = "Save Changes";
    document.getElementById('cancelEditBtn').style.display = "block";
    document.getElementById('title').value = product.title;
    document.getElementById('description').value = product.description || "";
    document.getElementById('price').value = product.price;
    document.getElementById('price_kiosk').value = product.price_kiosk || '';
    await loadCategoriesSelect(product.category);
    imageData = product.image; preview.src = imageData; preview.style.display = 'block';
    document.getElementById('formTitle').scrollIntoView({ behavior: 'smooth' });
}

async function updateProduct() {
    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value || "-"; 
    const price = document.getElementById('price').value;
    const price_kiosk = document.getElementById('price_kiosk').value;
    const category = document.getElementById('categorySelect').value;
    if(!title || !price || !imageData){ alert('Please fill in all required fields!'); return; }
    try { await apiCall('PUT', '/api/menu/products/' + currentEditingProductId, { title, price, price_kiosk: price_kiosk || null, image: imageData, category, description }); localStorage.removeItem('papaya_menu_cache'); await broadcastMenuUpdate(); clearForm(); await new Promise(r => setTimeout(r, 600)); await loadProducts(); } catch(e) { alert('Error updating data: ' + e.message); }
}

function clearForm(keepCategory) {
    currentEditingProductId = null; 
    document.getElementById('formTitle').textContent = "+ Add New Item"; 
    document.getElementById('submitProductBtn').textContent = "+ Add Item"; 
    document.getElementById('cancelEditBtn').style.display = "none";
    document.getElementById('title').value = ''; 
    document.getElementById('description').value = ''; 
    document.getElementById('price').value = ''; 
    document.getElementById('price_kiosk').value = '';
    if (keepCategory) {
        // Garder la même catégorie pour enchaîner les produits rapidement
        const sel = document.getElementById('categorySelect');
        const opt = [...sel.options].find(o => o.value === keepCategory);
        if (opt) sel.value = keepCategory; else sel.selectedIndex = 0;
    } else {
        document.getElementById('categorySelect').selectedIndex = 0;
    }
    document.getElementById('imageInput').value = ''; 
    preview.style.display = 'none'; 
    imageData = "";
}

async function deleteProduct(id){ 
    if(confirm('Are you sure you want to delete this item?')) {
        try { await apiCall('DELETE', '/api/menu/products/' + id); localStorage.removeItem('papaya_menu_cache'); await broadcastMenuUpdate(); if(currentEditingProductId === id) clearForm(); loadProducts(); } catch(e) {
          if (e.message && e.message.includes('propriétaire')) {
            if (confirm('⚠️ Accès refusé : seul le propriétaire peut supprimer.\n\nVotre session a peut-être expiré. Voulez-vous vous reconnecter ?')) {
              localStorage.removeItem('papaya_token'); localStorage.removeItem('papaya_user');
              sessionStorage.removeItem('papaya_auth'); sessionStorage.removeItem('papaya_user');
              window.location.replace('/dashboard');
            }
          } else { alert('Erreur suppression : ' + e.message); }
        }
    }
}

function makeCategoryEditable(id, currentCat) {
    const cell = document.getElementById('cat-cell-' + id);
    if (cell.querySelector('select')) return;
    let opts = "<option value='' disabled>Choisir...</option>";
    dbCategories.forEach(cat => {
        const label = cat.name_fr || cat.name_en || cat.name_ar || 'Sans nom';
        opts += `<option value="${label}" ${label === currentCat ? 'selected' : ''}>${label}</option>`;
    });
    cell.innerHTML = `<select class="inline-input" id="catselect-${id}" style="width:auto;padding:4px 8px;font-size:12px;">${opts}</select>`;
    const sel = document.getElementById('catselect-' + id);
    sel.focus();
    const pencilIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#95a5a6" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`;
    let isSaving = false;
    async function saveCat() {
        if (isSaving) return; isSaving = true;
        const newCat = sel.value;
        if (!newCat || newCat === currentCat) {
            cell.innerHTML = currentCat;
            cell.onclick = () => makeCategoryEditable(id, currentCat);
            return;
        }
        try {
            await apiCall('PUT', '/api/menu/products/' + id, { category: newCat });
            let p = globalProductsArray.find(p => p.id === id);
            if (p) p.category = newCat;
            cell.innerHTML = newCat;
            cell.onclick = () => makeCategoryEditable(id, newCat);
        } catch(e) {
            alert('Erreur: ' + e.message);
            cell.innerHTML = currentCat;
            cell.onclick = () => makeCategoryEditable(id, currentCat);
        }
    }
    sel.addEventListener('change', saveCat);
    sel.addEventListener('blur', () => { if (!isSaving) { cell.innerHTML = currentCat; cell.onclick = () => makeCategoryEditable(id, currentCat); } });
    sel.addEventListener('keydown', e => { if (e.key === 'Escape') { cell.innerHTML = currentCat; cell.onclick = () => makeCategoryEditable(id, currentCat); } });
}

                    </div>
                </td>
                <td id="desc-cell-${product.id}">

function makeFieldEditable(id, field, currentVal) {
    const cellId = field === 'title' ? 'name-cell-' + id : 'desc-cell-' + id;
    const cell = document.getElementById(cellId);
    if (cell.querySelector('input')) return;
    const isDesc = field === 'description';
    cell.innerHTML = `<input class="inline-input" id="finput-${field}-${id}" type="text" value="${currentVal}" autofocus>`;
    const input = document.getElementById(`finput-${field}-${id}`);
    input.focus(); input.select();
    const pencilIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#95a5a6" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`;
    let isSaving = false;
    async function saveField() {
        if (isSaving) return; isSaving = true;
        const newVal = input.value.trim() || (isDesc ? '-' : currentVal);
        const updateData = {}; updateData[field] = newVal;
        try { await apiCall('PUT', '/api/menu/products/' + id, updateData); } catch(e) { alert('Error: ' + e.message); isSaving = false; return; }
        let p = globalProductsArray.find(p => p.id === id);
        if (p) p[field] = newVal;
        const cssClass = isDesc ? 'td-desc' : 'td-name';
        cell.innerHTML = `<div class="${cssClass}" onclick="makeFieldEditable(${id}, '${field}', '${newVal.replace(/'/g, "\\'")}')">${pencilIcon} ${newVal || '-'}</div>`;
    }
    input.addEventListener('blur', saveField);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') {
            const cssClass = isDesc ? 'td-desc' : 'td-name';
            cell.innerHTML = `<div class="${cssClass}" onclick="makeFieldEditable(${id}, '${field}', '${currentVal.replace(/'/g, "\\'")}')">${pencilIcon} ${currentVal || '-'}</div>`;
        }
    });
}

async function toggleDisponibilite(id, isChecked) {
    const row = document.getElementById('row-' + id);
    if (isChecked) { row.classList.remove('indisponible'); } 
    else { row.classList.add('indisponible'); }
    try { await apiCall('PUT', '/api/menu/products/' + id, { disponible: isChecked }); await broadcastMenuUpdate(); } catch(e) { console.error(e); }
}

function makePriceEditable(id, currentPrice, priceField = 'price') {
    const cellId = priceField === 'price_kiosk' ? `price-kiosk-cell-${id}` : `price-cell-${id}`;
    const cell = document.getElementById(cellId);
    if (!cell || cell.querySelector('input')) return;
    cell.onclick = null;
    const inputId = `pinput-${priceField}-${id}`;
    cell.innerHTML = `<input class="price-input" id="${inputId}" type="number" step="0.01" value="${currentPrice}" autofocus placeholder="0.00">`;
    const input = document.getElementById(inputId);
    input.focus(); input.select();

    const renderCell = (val) => {
        if (priceField === 'price_kiosk') {
            cell.innerHTML = val
                ? `<div class="td-price">${val} <span class="dh">DH</span></div>`
                : `<div class="td-price"><span style="font-size:11px;opacity:0.4">— cliquer</span></div>`;
            cell.onclick = () => makePriceEditable(id, val || '', 'price_kiosk');
        } else {
            cell.innerHTML = `<div class="td-price">${val} <span class="dh">DH</span></div>`;
            cell.onclick = () => makePriceEditable(id, val, 'price');
        }
    };

    async function savePrice() {
        const rawVal = input.value.trim();
        // For kiosk price, allow empty to clear it
        if (priceField === 'price_kiosk' && rawVal === '') {
            try {
                await apiCall('PUT', '/api/menu/products/' + id, { price_kiosk: null });
                let p = globalProductsArray.find(p => p.id === id);
                if (p) p.price_kiosk = null;
                renderCell('');
            } catch(e) { renderCell(currentPrice); }
            return;
        }
        const newPrice = parseFloat(rawVal);
        if (isNaN(newPrice) || newPrice < 0) {
            renderCell(currentPrice);
        } else {
            try {
                const updateData = {}; updateData[priceField] = newPrice;
                await apiCall('PUT', '/api/menu/products/' + id, updateData);
                let p = globalProductsArray.find(p => p.id === id);
                if (p) p[priceField] = newPrice;
                renderCell(newPrice);
            } catch(e) { renderCell(currentPrice); }
        }
    }
    input.addEventListener('blur', savePrice);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { renderCell(currentPrice); }
    });
}

const hiddenImageInput = document.createElement('input');
hiddenImageInput.type = 'file'; hiddenImageInput.accept = 'image/*'; hiddenImageInput.style.display = 'none';
document.body.appendChild(hiddenImageInput);
let targetImageProductId = null;

function changeProductImage(id) { targetImageProductId = id; hiddenImageInput.click(); }

hiddenImageInput.addEventListener('change', async function() {
    const file = this.files[0];
    if (!file || targetImageProductId === null) return;
    try {
        const imgEl = document.getElementById('img-' + targetImageProductId);
        if (imgEl) { imgEl.style.opacity = '0.4'; }
        const newUrl = await uploadToCloudinary(file);
        apiCall('PUT', '/api/menu/products/' + targetImageProductId, { image: newUrl }).then(() => {
            if (imgEl) { imgEl.src = newUrl; imgEl.style.opacity = '1'; }
            let p = globalProductsArray.find(p => p.id === targetImageProductId);
            if (p) p.image = newUrl;
        }).catch(e => console.error(e));
    } catch(err) {
        alert('❌ Image upload failed: ' + err.message);
    }
    hiddenImageInput.value = '';
});

loadProducts();

<script>
// ── EXTRAS MODAL LOGIC ──
let _extrasProductId = null;
let _allExtrasGroups = [];
let _linkedGroupIds = new Set();

async function openExtrasModal(productId, productName) {
  _extrasProductId = productId;
  document.getElementById('extrasModalProductName').textContent = productName;
  document.getElementById('extrasModal').classList.add('open');
  document.getElementById('extrasGroupsList').innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3);">Loading…</div>';

  try {
    // Load all groups with their options
    const { data: groups } = await _supabase
      .from('extras_groups')
      .select('*, extras_options(*)')
      .order('id', { ascending: true });
    _allExtrasGroups = groups || [];

    // Load linked groups for this product
    const { data: links } = await _supabase
      .from('product_extras')
      .select('group_id')
      .eq('product_id', productId);
    _linkedGroupIds = new Set((links || []).map(l => l.group_id));

    renderExtrasGroupsList();
    // Update button color
    const btn = document.getElementById('extras-btn-' + productId);
    if (btn) btn.className = 'extras-btn' + (_linkedGroupIds.size > 0 ? ' has-extras' : '');
  } catch(e) {
    document.getElementById('extrasGroupsList').innerHTML = `<div style="color:#e74c3c;padding:20px;">${e.message}</div>`;
  }
}

function renderExtrasGroupsList() {
  const el = document.getElementById('extrasGroupsList');
  if (!_allExtrasGroups.length) {
    el.innerHTML = `<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3);">
      No extras groups yet.<br>
      <a href="/dashboard/extras" target="_blank" style="color:#c0392b;font-size:13px;">Create your first group →</a>
    </div>`;
    return;
  }
  el.innerHTML = _allExtrasGroups.map(g => {
    const linked = _linkedGroupIds.has(g.id);
    const opts = (g.extras_options || []);
    const optNames = opts.slice(0, 4).map(o => o.name).join(', ') + (opts.length > 4 ? '…' : '');
    const tag = g.is_mandatory ? `<span class="tag-req">Required</span>` : `<span class="tag-opt">Optional</span>`;
    return `<div class="eg-row${linked ? ' linked' : ''}" id="eg-row-${g.id}">
      <div class="eg-info">
        <div class="eg-name">${escHtmlAdmin(g.name)} ${tag}</div>
        <div class="eg-sub">max ${g.max_selections || 1} choice · ${opts.length} option${opts.length!==1?'s':''}</div>
        ${opts.length ? `<div class="eg-options-preview">↳ ${optNames}</div>` : ''}
      </div>
      <button id="eg-btn-${g.id}" class="eg-link-btn ${linked ? 'unlink' : 'link'}" onclick="toggleExtrasLink(${g.id}, ${linked})">
        ${linked ? '✓ Linked' : '+ Link'}
      </button>
    </div>`;
  }).join('');
}

async function toggleExtrasLink(groupId, isLinked) {
  const btn = document.getElementById('eg-btn-' + groupId);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    if (isLinked) {
      await apiCall('DELETE', `/api/extras/product/${_extrasProductId}/unlink/${groupId}`);
      _linkedGroupIds.delete(groupId);
    } else {
      await apiCall('POST', `/api/extras/product/${_extrasProductId}/link`, { group_id: groupId });
      _linkedGroupIds.add(groupId);
    }
    renderExtrasGroupsList();
    // Update button badge
    const mainBtn = document.getElementById('extras-btn-' + _extrasProductId);
    if (mainBtn) mainBtn.className = 'extras-btn' + (_linkedGroupIds.size > 0 ? ' has-extras' : '');
  } catch(e) {
    alert('Error: ' + e.message);
    renderExtrasGroupsList();
  }
}

function closeExtrasModal() {
  document.getElementById('extrasModal').classList.remove('open');
  _extrasProductId = null;
}

function escHtmlAdmin(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Load extras badge counts after products load ──
async function loadExtrasBadges() {
  try {
    const { data: links } = await _supabase.from('product_extras').select('product_id');
    const withExtras = new Set((links||[]).map(l => l.product_id));
    withExtras.forEach(pid => {
      const btn = document.getElementById('extras-btn-' + pid);
      if (btn) btn.className = 'extras-btn has-extras';
    });
  } catch(e) { /* silent */ }
}
// Hook into loadProducts to also refresh badges
