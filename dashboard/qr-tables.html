<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #1b2e1e;
  --orange:    #f97316;
  --orange2:   #ea6a0a;
  --glass:     rgba(255,255,255,0.06);
  --glass-hov: rgba(255,255,255,0.10);
  --border:    rgba(255,255,255,0.10);
  --border-hov:rgba(249,115,22,0.35);
  --shadow:    0 8px 32px rgba(0,0,0,0.35);
  --white:     #ffffff;
  --muted:     rgba(255,255,255,0.50);
  --blur:      blur(18px);
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--white);
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 55% 40% at 15% 85%, rgba(249,115,22,.08) 0%, transparent 70%),
    radial-gradient(ellipse 45% 35% at 85% 15%, rgba(249,115,22,.06) 0%, transparent 65%);
  pointer-events: none;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  margin: 14px 18px 0;
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border); border-radius: 999px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px 8px 14px;
}
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-icon {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #f97316, #b45309);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  overflow: hidden;
}
.brand-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.brand-name { font-size: 17px; font-weight: 800; color: var(--orange); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn-icon {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: background .15s, color .15s; text-decoration: none;
}
.btn-icon:hover { background: var(--glass-hov); color: white; }

/* ── MAIN ── */
.main {
  position: relative; z-index: 5;
  max-width: 1100px; margin: 0 auto;
  padding: 32px 24px 64px;
}

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 24px; }
.page-title {
  font-size: 28px; font-weight: 700; color: white;
  font-family: 'Playfair Display', serif;
  display: flex; align-items: center; gap: 12px;
}
.page-title span { color: var(--orange); font-style: italic; }
.page-subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* ── INFO BANNERS ── */
.info-banner {
  display: flex; align-items: flex-start; gap: 14px;
  border-radius: 14px; padding: 14px 18px; margin-bottom: 12px;
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
}
.info-banner.blue {
  background: rgba(59,130,246,0.10);
  border: 1px solid rgba(59,130,246,0.25);
}
.info-banner.orange {
  background: rgba(249,115,22,0.10);
  border: 1px solid rgba(249,115,22,0.25);
}
.ib-icon {
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.info-banner.blue .ib-icon  { background: rgba(59,130,246,0.2);  }
.info-banner.orange .ib-icon { background: rgba(249,115,22,0.2); }
.ib-text strong { display: block; font-size: 13px; font-weight: 700; color: white; margin-bottom: 2px; }
.ib-text span   { font-size: 12px; color: var(--muted); }

/* ── CONTROLS ROW ── */
.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.controls-left  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.controls-right { display: flex; gap: 10px; }

.count-label {
  font-size: 13px; font-weight: 600; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.count-input {
  width: 76px; padding: 8px 12px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 10px;
  color: white; font-family: inherit; font-size: 14px; font-weight: 700;
  outline: none; transition: border-color .2s;
}
.count-input:focus { border-color: rgba(249,115,22,.6); }

.btn-gen {
  background: var(--orange); color: white; border: none;
  border-radius: 999px; padding: 9px 20px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-gen:hover { background: var(--orange2); }

.btn-print {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.35);
  color: #93c5fd;
  border-radius: 999px; padding: 9px 18px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-print:hover { background: rgba(59,130,246,0.25); }

.btn-dl-all {
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.35);
  color: #86efac;
  border-radius: 999px; padding: 9px 18px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-dl-all:hover { background: rgba(34,197,94,0.25); }

/* ── QR GRID ── */
.qr-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ── QR CARD ── */
.qr-card {
  background: #ffffff;
  border-radius: 16px;
  padding: 15px 16px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  transition: transform .22s, box-shadow .22s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  color: #1a1a2e;
  min-width: 220px;
}
.qr-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}

.qr-logo-wrap {
  width: 60px; height: 60px;
  display: flex; align-items: center; justify-content: center;
}
.qr-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

.qr-menu-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 700;
  color: #1a1a2e; letter-spacing: 1px;
  border-bottom: 2px solid #e53e3e;
  padding-bottom: 3px; line-height: 1.1;
}

.qr-img-wrap {
  background: #1a1a2e; border-radius: 10px; padding: 8px;
  display: flex; align-items: center; justify-content: center;
}
.qr-img-wrap canvas { display: block; }

.qr-scan-title {
  font-size: 16px; font-weight: 900;
  color: #e53e3e; letter-spacing: 2px;
  text-align: center; line-height: 1;
}
.qr-scan-sub {
  font-size: 9px; font-weight: 700;
  color: #1a1a2e; letter-spacing: 1.5px;
  text-align: center;
}

.qr-table-num {
  font-size: 27px; font-weight: 900;
  color: #1a1a2e; line-height: 1;
}

.btn-dl-card {
  width: 100%; background: var(--orange); color: white; border: none;
  border-radius: 10px; padding: 10px 0;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 4px 14px rgba(249,115,22,.35);
  transition: background .15s; margin-top: 4px;
}
.btn-dl-card:hover { background: var(--orange2); }

/* ── PRINT ── */
@page {
  size: A4 portrait;
  margin: 10mm;
}
@media print {
  body { background: white; color: black; }
  body::before { display: none; }
  .topbar, .page-header, .info-banner, .controls-row, .btn-dl-card { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(3, 60mm);
    grid-auto-rows: 82mm;
    gap: 5mm;
    justify-content: center;
  }
  .qr-card {
    width: 60mm; height: 82mm;
    background: white; border: 1px solid #ddd; border-radius: 8px;
    padding: 2mm 2mm; break-inside: avoid; box-shadow: none;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; gap: 0;
    overflow: hidden;
  }
  .qr-logo-wrap { width: 11mm; height: 11mm; flex-shrink: 0; }
  .qr-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .qr-menu-title { font-size: 10pt; padding-bottom: 1mm; flex-shrink: 0; }
  .qr-img-wrap { background: #1a1a2e; padding: 2mm; flex-shrink: 0; }
  .qr-img-wrap canvas { width: 32mm !important; height: 32mm !important; }
  .qr-scan-title { font-size: 7pt; letter-spacing: 1px; flex-shrink: 0; }
  .qr-scan-sub { font-size: 5pt; letter-spacing: 1px; flex-shrink: 0; }
  .qr-table-num { font-size: 13pt; flex-shrink: 0; }
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .qr-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .topbar { margin: 10px 10px 0; }
  .main { padding: 20px 14px 48px; }
  .controls-row { flex-direction: column; align-items: flex-start; }
  .controls-right { width: 100%; }
  .btn-print, .btn-dl-all { flex: 1; justify-content: center; }
}
@media (max-width: 420px) {
  .qr-grid { grid-template-columns: 1fr; }
}

async function makeTableToken(tableNum) {
  const res = await fetch('/api/generate-qr-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ table: tableNum })
  });
  if (!res.ok) throw new Error('Erreur génération token');
  const data = await res.json();
  return data.token;
}

function dlFromDiv(qrDiv, i) {
  const canvas = qrDiv.querySelector('canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = `table-${i}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  const cards = document.querySelectorAll('.qr-card');
  if (!cards.length) { alert("Cliquez sur Générer d'abord."); return; }
  let idx = 0;
  function next() {
    if (idx >= cards.length) return;
    const qrDiv = cards[idx].querySelector('.qr-img-wrap > div');
    if (qrDiv) dlFromDiv(qrDiv, idx + 1);
    idx++;
    setTimeout(next, 200);
  }
  next();
}

async function saveTableCount(n) {
  await _db.from('settings').upsert({ key: 'table_count', value: String(n) });
}

async function loadTableCount() {
  const { data } = await _db.from('settings').select('value').eq('key', 'table_count').single();
  return data ? parseInt(data.value) : 20;
}
