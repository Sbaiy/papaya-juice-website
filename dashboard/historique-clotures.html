<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
   <link rel="icon" href="logo.icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique Clôtures — Papaya Juice</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1b2e1e;
      --orange:    #f97316;
      --orange2:   #ea6a0a;
      --glass:     rgba(255,255,255,0.06);
      --glass-hov: rgba(255,255,255,0.10);
      --border:    rgba(255,255,255,0.10);
      --border-hov:rgba(249,115,22,0.35);
      --shadow:    0 8px 32px rgba(0,0,0,0.35);
      --white:     #ffffff;
      --text:      #ffffff;
      --muted:     rgba(255,255,255,0.50);
      --blur:      blur(18px);
      --card:      rgba(255,255,255,0.06);
      --green: #22c55e; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

    /* TOPBAR (comme les autres pages) */
    .topbar { position: sticky; top: 0; z-index: 100; margin: 14px 18px 0; background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: 999px; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 8px 14px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 34px; height: 34px; border-radius: 50%; overflow: hidden; }
    .brand-name { font-size: 17px; font-weight: 800; color: var(--orange); }
    .nav-back { display: flex; align-items: center; gap: 6px; color: white; font-size: 13px; font-weight: 600; text-decoration: none; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); transition: all .15s; }
    .nav-back:hover { border-color: var(--border-hov); background: var(--glass-hov); }

    /* MAIN */
    main { max-width: 760px; margin: 0 auto; padding: 28px 18px; }
    .page-header { margin-bottom: 28px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: white; margin-bottom: 6px; }
    .page-title span { color: var(--orange); font-style: italic; }
    .page-sub { font-size: 13px; color: var(--muted); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); transition: transform .22s, border-color .22s, background .22s; }
    .stat-card:hover { transform: translateY(-4px); border-color: var(--border-hov); background: var(--glass-hov); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .stat-value { font-size: 22px; font-weight: 800; color: var(--orange); }

    /* FILTERS */
    .filters-bar {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      box-shadow: var(--shadow);
    }
    .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .filter-select, .filter-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      padding: 10px 13px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .filter-select:focus, .filter-input:focus { border-color: rgba(249,115,22,.5); }
    .filter-select option { background: #1b2e1e; }
    .filter-input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .btn-reset:hover { color: var(--text); border-color: var(--border-hov); }

    /* RESULTS COUNT */
    .results-info {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 2px;
    }
    .results-info span { color: var(--orange); font-weight: 600; }

    /* CLOTURES LIST */
    .cloture-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: 18px; padding: 18px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); transition: transform .22s, border-color .22s, background .22s; }
    .cloture-card:hover { transform: translateY(-3px); border-color: var(--border-hov); background: var(--glass-hov); }
    .cloture-num { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .cloture-date { font-size: 13px; font-weight: 600; color: var(--text); }
    .cloture-caissier { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .avatar { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, var(--orange), #b45309); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; }
    .cloture-right { text-align: right; }
    .cloture-total { font-size: 18px; font-weight: 800; color: var(--orange); }
    .cloture-cmds { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* LOADING */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    .btn-print {
      background: transparent;
      border: 1px solid rgba(249,115,22,.35);
      border-radius: 8px;
      color: var(--orange);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-print:hover { background: rgba(249,115,22,.1); border-color: var(--orange); }
    .btn-print:active { transform: scale(0.97); }
    .btn-print.loading { opacity: 0.6; pointer-events: none; }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .filters-bar { flex-direction: column; }
      .filter-group { min-width: 100%; }
    }
  </style>
  <script src="/dashboard/nav.js" defer></script>
</head>
<body>

<header class="topbar">
  <div class="nav-brand">
    <div class="brand-icon"><img src="/logo.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="logo"></div>
    <span class="brand-name">Papaya Juice</span>
  </div>
  <a href="/dashboard" class="nav-back">← Tableau de bord</a>
</header>

<main>
  <div class="page-header">
    <h1 class="page-title">Historique des <span>Clôtures</span></h1>
    <div class="page-sub">Toutes les clôtures de caisse enregistrées</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total clôtures</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Revenu total</div>
      <div class="stat-value" id="statRevenu">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Commandes total</div>
      <div class="stat-value" id="statCommandes">—</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-group">
      <div class="filter-label">🧑‍💼 Serveur / Caissier</div>
      <select class="filter-select" id="filterCaissier">
        <option value="">Tous les serveurs</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">📅 Date</div>
      <input type="date" class="filter-input" id="filterDate" />
    </div>
    <button class="btn-reset" id="btnReset">✕ Réinitialiser</button>
  </div>

  <div class="results-info" id="resultsInfo" style="display:none"></div>

  <div id="clotures-list">
    <div class="loading">Chargement...</div>
  </div>
</main>

<script src="../api.js"></script>
<script>
const BACKEND_URL = 'https://papaya-juice-backend-production.up.railway.app';

// Auth check
if (!localStorage.getItem('papaya_token')) {
  window.location.replace('/dashboard');
}

let allClotures = [];

async function loadClotures() {
  const list = document.getElementById('clotures-list');
  try {
    const token = localStorage.getItem('papaya_token');
    const res = await fetch(BACKEND_URL + '/api/clotures', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Erreur serveur');
    allClotures = await res.json();

    // Populate caissier dropdown with unique names
    const caissiers = [...new Set(allClotures.map(c => c.caissier).filter(Boolean))].sort();
    const select = document.getElementById('filterCaissier');
    caissiers.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });

    renderClotures();

  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Erreur: ${e.message}</div></div>`;
  }
}

function renderClotures() {
  const list        = document.getElementById('clotures-list');
  const resultsInfo = document.getElementById('resultsInfo');
  const caissier    = document.getElementById('filterCaissier').value;
  const dateVal     = document.getElementById('filterDate').value; // "YYYY-MM-DD"

  // Apply filters
  let filtered = allClotures.filter(c => {
    const matchCaissier = !caissier || c.caissier === caissier;

    let matchDate = true;
    if (dateVal) {
      const cDate = new Date(c.created_at);
      const y = cDate.getFullYear();
      const m = String(cDate.getMonth() + 1).padStart(2, '0');
      const d = String(cDate.getDate()).padStart(2, '0');
      matchDate = `${y}-${m}-${d}` === dateVal;
    }

    return matchCaissier && matchDate;
  });

  // Update stats based on filtered results
  const totalRevenu = filtered.reduce((s, c) => s + parseFloat(c.total || 0), 0);
  const totalCmds   = filtered.reduce((s, c) => s + parseInt(c.nbr_commandes || 0), 0);
  document.getElementById('statTotal').textContent     = filtered.length;
  document.getElementById('statRevenu').textContent    = totalRevenu.toFixed(2) + ' DH';
  document.getElementById('statCommandes').textContent = totalCmds;

  // Results info bar
  const isFiltered = caissier || dateVal;
  if (isFiltered) {
    resultsInfo.style.display = 'block';
    resultsInfo.innerHTML = `<span>${filtered.length}</span> clôture${filtered.length !== 1 ? 's' : ''} trouvée${filtered.length !== 1 ? 's' : ''}${caissier ? ` · Serveur: <span>${caissier}</span>` : ''}${dateVal ? ` · Date: <span>${new Date(dateVal + 'T00:00:00').toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})}</span>` : ''}`;
  } else {
    resultsInfo.style.display = 'none';
  }

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Aucune clôture trouvée pour ce filtre</div></div>`;
    return;
  }

  // Stocker les données dans une map JS pour éviter les problèmes d'échappement dans onclick
  window._cloturesMap = {};
  filtered.forEach(c => { window._cloturesMap[c.id] = c; });

  list.innerHTML = filtered.map((c) => {
    const date = new Date(c.created_at).toLocaleString('fr-FR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    const initials = (c.caissier || 'S').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const num = allClotures.length - allClotures.indexOf(c);
    return `
    <div class="cloture-card">
      <div>
        <div class="cloture-num">Clôture #${num}</div>
        <div class="cloture-date">📅 ${date}</div>
        <div class="cloture-caissier">
          <span class="avatar">${initials}</span>
          ${c.caissier}
        </div>
      </div>
      <div class="cloture-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div>
          <div class="cloture-total">${parseFloat(c.total).toFixed(2)} DH</div>
          <div class="cloture-cmds">${c.nbr_commandes} commandes</div>
        </div>
        <button class="btn-print" onclick="imprimerCloture('${c.id}', ${num}, this)">
          🖨️ Imprimer
        </button>
      </div>
    </div>`;
  }).join('');
}

// Event listeners
document.getElementById('filterCaissier').addEventListener('change', renderClotures);
document.getElementById('filterDate').addEventListener('change', renderClotures);
document.getElementById('btnReset').addEventListener('click', () => {
  document.getElementById('filterCaissier').value = '';
  document.getElementById('filterDate').value = '';
  renderClotures();
});

async function imprimerCloture(id, num, btn) {
  const c = window._cloturesMap && window._cloturesMap[id];
  if (!c) { alert('Données introuvables'); return; }
  btn.classList.add('loading');
  btn.textContent = '⏳ Impression...';

  try {
    const cfg = JSON.parse(localStorage.getItem('papaya_print_config') || '{}');

    const date    = new Date(c.created_at);
    const dateStr = date.toLocaleDateString('fr-FR');
    const timeStr = date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const sep     = '--------------------------------\n';
    const sep2    = '================================\n';
    const pad     = (str, len) => String(str).padEnd(len);
    const padL    = (str, len) => String(str).padStart(len);
    const C_ART = 28, C_QTY = 4, C_TOT = 9;
    const artLine = (name, qty, total) =>
      pad(name, C_ART) + padL(String(qty), C_QTY) + ' ' + padL(String(total), C_TOT);

    let ticket = '\n';
    ticket += '   CLOTURE GLOBALE\n';
    ticket += sep2;
    ticket += `N CLOTURE : ${c.id || num}\n`;
    ticket += `DATE      : ${dateStr} ${timeStr}\n`;
    ticket += sep;

    // ── Détail articles par catégorie si disponible ──
    const snap = c.items_snapshot;
    if (snap && typeof snap === 'object' && Object.keys(snap).length > 0) {
      ticket += artLine('Article', 'Qte', 'TOTAL_NET') + '\n';
      ticket += sep;
      Object.keys(snap).sort().forEach(cat => {
        ticket += `${cat}\n`;
        let catTotal = 0, catQty = 0;
        Object.keys(snap[cat]).sort().forEach(name => {
          const { qty, total } = snap[cat][name];
          const shortName = '  ' + name.substring(0, C_ART - 2);
          ticket += artLine(shortName, qty, parseFloat(total).toFixed(0)) + '\n';
          catTotal += parseFloat(total);
          catQty   += parseInt(qty);
        });
        ticket += artLine('* TOTAL FAMILLE *', '*' + catQty + '*', '*' + catTotal.toFixed(0) + '*') + '\n';
        ticket += sep;
      });
    } else {
      // Ancien enregistrement sans détail
      ticket += artLine('Article', 'Qte', 'TOTAL_NET') + '\n';
      ticket += sep;
      ticket += '  (Détail non disponible)\n';
      ticket += sep;
    }

    ticket += sep2;
    ticket += `TOTAL NET: ${padL(parseFloat(c.total).toFixed(2) + ' DH', 20)}\n`;
    ticket += sep2;
    ticket += `ESPECES  : ${padL(parseFloat(c.total).toFixed(2) + ' DH', 21)}\n`;
    ticket += sep;
    ticket += `CAISSIER : ${c.caissier}\n`;
    ticket += sep;
    ticket += `COMMANDES: ${padL(String(c.nbr_commandes), 22)}\n`;
    ticket += sep;

    // ── PrintNode si configuré (imprimante clôture dédiée, sinon addition) ──
    const cloturePrinterId = cfg.cloturePrinter || cfg.cashPrinter;
    if (cfg.apiKey && cloturePrinterId) {
      const ESC = '\x1B', GS = '\x1D';
      const INIT       = ESC + '@';
      const ALIGN_LEFT = ESC + 'a' + '\x00';
      const FEED       = ESC + 'd' + '\x01';
      const CUT        = GS  + 'V' + '\x41' + '\x03';
      const raw = INIT + ALIGN_LEFT + ticket + FEED + CUT;
      const bytes = [];
      for (let i = 0; i < raw.length; i++) bytes.push(raw.charCodeAt(i) & 0xFF);
      const uint8 = new Uint8Array(bytes);
      let binary = '';
      uint8.forEach(b => binary += String.fromCharCode(b));
      const base64 = btoa(binary);

      const res = await fetch('https://api.printnode.com/printjobs', {
        method: 'POST',
        headers: {
          'Authorization': 'Basic ' + btoa(cfg.apiKey + ':'),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          printerId: parseInt(cloturePrinterId),
          title: 'Clôture #' + (c.id || num),
          contentType: 'raw_base64',
          content: base64,
          source: 'Historique Clôtures'
        })
      });
      if (!res.ok) throw new Error('PrintNode erreur ' + res.status);
      btn.textContent = '✅ Imprimé !';
    } else {
      // ── Fallback navigateur ──
      const win = window.open('', '_blank', 'width=400,height=600');
      win.document.write(`<pre style="font-family:monospace;font-size:13px;white-space:pre;">${ticket}</pre>`);
      win.document.close();
      win.print();
      btn.textContent = '✅ Imprimé !';
    }
  } catch(e) {
    btn.textContent = '❌ Erreur';
    console.error('Impression échouée:', e);
  } finally {
    btn.classList.remove('loading');
    setTimeout(() => { btn.innerHTML = '🖨️ Imprimer'; }, 2500);
  }
}

loadClotures();
</script>

  <script src="/i18n.js"></script>
</body>
</html>
